<!DOCTYPE html>
<html lang="en">
<head>
  <title>AskKade</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1724;
      --surface: #162033;
      --surface2: #1c2a42;
      --border: #2a3f5f;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --accent3: #f472b6;
      --accent4: #34d399;
      --text: #e0eaff;
      --muted: #5a7299;
      --user-bubble: linear-gradient(135deg, #6366f1, #38bdf8);
      --bot-bubble: #162033;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(56,189,248,0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 10%, rgba(244,114,182,0.07) 0%, transparent 40%);
      pointer-events: none;
    }

    .dot-grid {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(56,189,248,0.07) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
    }

    /* ---- TRAVELLING OBJECTS ---- */
    .canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    /* Shooting stars - fall diagonally */
    .star {
      position: absolute;
      border-radius: 999px;
      opacity: 0;
    }

    .star-1 {
      width: 2px; height: 90px;
      background: linear-gradient(180deg, transparent, var(--accent));
      top: -10%; left: 15%;
      animation: shootStar 5s ease-in infinite 0s;
    }
    .star-2 {
      width: 2px; height: 60px;
      background: linear-gradient(180deg, transparent, var(--accent2));
      top: -10%; left: 55%;
      animation: shootStar 6s ease-in infinite 2s;
    }
    .star-3 {
      width: 2px; height: 110px;
      background: linear-gradient(180deg, transparent, var(--accent3));
      top: -10%; left: 80%;
      animation: shootStar 4.5s ease-in infinite 4s;
    }
    .star-4 {
      width: 2px; height: 75px;
      background: linear-gradient(180deg, transparent, var(--accent4));
      top: -10%; left: 35%;
      animation: shootStar 7s ease-in infinite 1s;
    }
    .star-5 {
      width: 2px; height: 55px;
      background: linear-gradient(180deg, transparent, var(--accent));
      top: -10%; left: 70%;
      animation: shootStar 5.5s ease-in infinite 3.5s;
    }

    @keyframes shootStar {
      0%   { opacity: 0; transform: translateY(0) translateX(0); }
      8%   { opacity: 1; }
      85%  { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(115vh) translateX(60px); }
    }

    /* Horizontal travelling orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
    }

    .orb-1 {
      width: 8px; height: 8px;
      background: var(--accent);
      box-shadow: 0 0 14px var(--accent), 0 0 28px rgba(56,189,248,0.3);
      top: 78%; left: -2%;
      animation: travelRight 11s linear infinite 0s;
    }
    .orb-2 {
      width: 5px; height: 5px;
      background: var(--accent2);
      box-shadow: 0 0 10px var(--accent2);
      top: 38%; left: -2%;
      animation: travelRight 9s linear infinite 3s;
    }
    .orb-3 {
      width: 7px; height: 7px;
      background: var(--accent3);
      box-shadow: 0 0 12px var(--accent3);
      top: 58%; left: -2%;
      animation: travelRight 14s linear infinite 6s;
    }
    .orb-4 {
      width: 4px; height: 4px;
      background: var(--accent4);
      box-shadow: 0 0 8px var(--accent4);
      top: 22%; left: -2%;
      animation: travelRight 10s linear infinite 1.5s;
    }
    .orb-5 {
      width: 6px; height: 6px;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      top: 65%; left: -2%;
      animation: travelRight 13s linear infinite 8s;
    }

    @keyframes travelRight {
      0%   { opacity: 0; transform: translateX(0) translateY(0); }
      5%   { opacity: 1; }
      90%  { opacity: 0.8; }
      100% { opacity: 0; transform: translateX(105vw) translateY(-25px); }
    }

    /* Expanding rings that travel */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid;
      opacity: 0;
    }

    .ring-1 {
      width: 18px; height: 18px;
      border-color: rgba(56,189,248,0.6);
      top: 32%; left: 3%;
      animation: ringTravel 9s ease-out infinite 0s;
    }
    .ring-2 {
      width: 14px; height: 14px;
      border-color: rgba(129,140,248,0.5);
      top: 62%; left: 8%;
      animation: ringTravel 11s ease-out infinite 4s;
    }
    .ring-3 {
      width: 10px; height: 10px;
      border-color: rgba(244,114,182,0.5);
      top: 48%; left: 0%;
      animation: ringTravel 8s ease-out infinite 2s;
    }

    @keyframes ringTravel {
      0%   { opacity: 0; transform: translateX(0) scale(1); }
      8%   { opacity: 0.9; }
      100% { opacity: 0; transform: translateX(106vw) scale(4); }
    }

    /* Rising particles from bottom */
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      opacity: 0;
    }

    .particle-1 { background: var(--accent);  bottom: -5%; left: 18%; animation: riseUp 8s ease-out infinite 0s; }
    .particle-2 { background: var(--accent2); bottom: -5%; left: 48%; animation: riseUp 10s ease-out infinite 2s; }
    .particle-3 { background: var(--accent3); bottom: -5%; left: 73%; animation: riseUp 7s ease-out infinite 4.5s; }
    .particle-4 { background: var(--accent4); bottom: -5%; left: 88%; animation: riseUp 9s ease-out infinite 1s; }

    @keyframes riseUp {
      0%   { opacity: 0; transform: translateY(0) translateX(0); }
      10%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-110vh) translateX(30px); }
    }

    /* ---- APP ---- */
    .app {
      width: 480px;
      height: 700px;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 10;
      border-radius: 24px;
      box-shadow:
        0 0 0 1px rgba(56,189,248,0.12),
        0 30px 80px rgba(0,0,0,0.55),
        0 0 80px rgba(99,102,241,0.07);
    }

    /* Header */
    .header {
      padding: 20px 24px 16px;
      background: rgba(22,32,51,0.96);
      backdrop-filter: blur(24px);
      border-radius: 24px 24px 0 0;
      border: 1px solid rgba(56,189,248,0.13);
      border-bottom: 1px solid rgba(56,189,248,0.08);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent3), var(--accent4), var(--accent2));
      background-size: 300% 100%;
      animation: shimmer 5s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 0% 0%; }
      100% { background-position: 300% 0%; }
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .logo { display: flex; align-items: center; gap: 12px; }

    .logo-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #38bdf8);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(99,102,241,0.45), 0 0 40px rgba(56,189,248,0.2);
      animation: iconPulse 3s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(99,102,241,0.45), 0 0 40px rgba(56,189,248,0.2); }
      50%       { box-shadow: 0 0 32px rgba(99,102,241,0.7), 0 0 60px rgba(56,189,248,0.35); }
    }

    .logo-text {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 22px;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #818cf8, #38bdf8, #34d399, #818cf8);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 5s linear infinite;
    }

    .status {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; color: var(--muted);
      font-family: 'Orbitron', sans-serif; letter-spacing: 1.5px;
      background: rgba(56,189,248,0.05);
      padding: 5px 10px; border-radius: 20px;
      border: 1px solid rgba(56,189,248,0.1);
    }

    .status-dot {
      width: 6px; height: 6px;
      background: #34d399; border-radius: 50%;
      box-shadow: 0 0 8px #34d399;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .greeting { font-size: 12px; color: var(--muted); font-weight: 300; animation: fadeIn 0.8s ease; }
    .greeting span { color: var(--accent); font-weight: 600; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Chat box */
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      background: rgba(8,12,22,0.98);
      display: flex; flex-direction: column; gap: 14px;
      border-left: 1px solid rgba(56,189,248,0.07);
      border-right: 1px solid rgba(56,189,248,0.07);
    }

    .chat-box::-webkit-scrollbar { width: 3px; }
    .chat-box::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 3px; }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 28px 20px;
      animation: fadeInUp 0.8s ease;
    }

    .welcome-icon {
      font-size: 46px; margin-bottom: 14px; display: block;
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 0 14px rgba(56,189,248,0.45));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%       { transform: translateY(-10px) rotate(3deg); }
    }

    .welcome h2 {
      font-family: 'Orbitron', sans-serif; font-size: 14px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 10px; letter-spacing: 2px;
    }

    .welcome p { font-size: 13px; color: var(--muted); line-height: 1.7; max-width: 300px; margin: 0 auto; }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }

    .chip {
      padding: 6px 14px; border-radius: 20px; font-size: 12px;
      color: var(--accent); border: 1px solid rgba(56,189,248,0.2);
      background: rgba(56,189,248,0.05); cursor: pointer; transition: all 0.2s;
    }

    .chip:hover {
      background: rgba(56,189,248,0.12);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Messages */
    .message {
      display: flex; gap: 10px;
      animation: msgIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0; margin-top: 2px;
    }

    .bot-avatar  { background: linear-gradient(135deg, #6366f1, #38bdf8); box-shadow: 0 0 12px rgba(99,102,241,0.3); }
    .user-avatar { background: linear-gradient(135deg, #f472b6, #818cf8); box-shadow: 0 0 12px rgba(244,114,182,0.3); }

    .bubble {
      padding: 11px 15px; border-radius: 16px;
      max-width: 78%; font-size: 13.5px; line-height: 1.65; word-wrap: break-word;
    }

    .bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid rgba(56,189,248,0.1);
      color: var(--text); border-bottom-left-radius: 4px;
    }

    .user .bubble {
      background: var(--user-bubble); color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 20px rgba(99,102,241,0.25);
    }

    /* Thinking dots */
    .thinking-dots { display: inline-flex; gap: 5px; align-items: center; padding: 2px 0; }

    .thinking-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      animation: dotBounce 1.2s ease-in-out infinite;
    }

    .thinking-dots span:nth-child(1) { background: var(--accent); }
    .thinking-dots span:nth-child(2) { background: var(--accent2); animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { background: var(--accent3); animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50%       { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px;
      background: rgba(22,32,51,0.97);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(56,189,248,0.1);
      border-top: 1px solid rgba(56,189,248,0.07);
      border-radius: 0 0 24px 24px;
      position: relative;
    }

    .input-area::after {
      content: '';
      position: absolute;
      bottom: 0; left: 8%; right: 8%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(56,189,248,0.25), rgba(129,140,248,0.25), transparent);
    }

    input {
      flex: 1;
      background: rgba(8,12,22,0.85);
      border: 1px solid rgba(56,189,248,0.14);
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 13.5px; color: var(--text);
      font-family: 'Syne', sans-serif;
      outline: none; transition: all 0.3s;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: rgba(56,189,248,0.4);
      background: rgba(12,18,32,0.9);
      box-shadow: 0 0 18px rgba(56,189,248,0.07);
    }

    .send-btn {
      width: 44px; height: 44px; border-radius: 13px;
      background: linear-gradient(135deg, #6366f1, #38bdf8);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(99,102,241,0.35);
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .send-btn:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 6px 26px rgba(56,189,248,0.45); }
    .send-btn:active { transform: scale(0.92); }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>
  <div class="dot-grid"></div>

  <div class="canvas">
    <div class="star star-1"></div>
    <div class="star star-2"></div>
    <div class="star star-3"></div>
    <div class="star star-4"></div>
    <div class="star star-5"></div>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="orb orb-5"></div>

    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>

    <div class="particle particle-1"></div>
    <div class="particle particle-2"></div>
    <div class="particle particle-3"></div>
    <div class="particle particle-4"></div>
  </div>

  <div class="app">
    <div class="header">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">⚡</div>
          <div class="logo-text">ASKKADE</div>
        </div>
        <div class="status">
          <div class="status-dot"></div>
          ONLINE
        </div>
      </div>
      <div class="greeting" id="greeting"></div>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="welcome">
        <span class="welcome-icon">🤖</span>
        <h2>WELCOME TO ASKKADE</h2>
        <p id="welcomeMsg"></p>
        <div class="chips">
          <div class="chip" onclick="quickAsk('What can you do?')">What can you do?</div>
          <div class="chip" onclick="quickAsk('Tell me something cool')">Something cool</div>
          <div class="chip" onclick="quickAsk('Give me a fun fact')">Fun fact</div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask me anything..." />
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    const greetings = [
      "⚡ <span>AskKade is charged up and ready.</span>",
      "🚀 <span>Ready to launch some answers?</span>",
      "🔥 <span>Hot take incoming — what's your question?</span>",
      "🤙 <span>Kade's in the building. What's good?</span>",
      "💡 <span>Big brain energy activated.</span>",
      "😎 <span>Cool. Calm. Ready. Let's go.</span>",
      "🌊 <span>Riding the AI wave — hop on.</span>",
      "🎯 <span>Locked in. What do you need?</span>",
    ];

    const welcomeMsgs = [
      "I'm AskKade — your AI with personality. Drop a question and let's vibe.",
      "No boring answers here. Ask me anything and I'll keep it real.",
      "Think of me as your smartest friend who never sleeps.",
      "Powered by AI, seasoned with Kade energy. What do you need?",
    ];

    document.getElementById("greeting").innerHTML = greetings[Math.floor(Math.random() * greetings.length)];
    document.getElementById("welcomeMsg").textContent = welcomeMsgs[Math.floor(Math.random() * welcomeMsgs.length)];

    function quickAsk(text) {
      document.getElementById("userInput").value = text;
      sendMessage();
    }

    async function sendMessage() {
      const inputEl = document.getElementById("userInput");
      const input = inputEl.value.trim();
      if (!input) return;

      const chatBox = document.getElementById("chatBox");
      const welcome = chatBox.querySelector(".welcome");
      if (welcome) welcome.remove();

      const userMsg = document.createElement("div");
      userMsg.className = "message user";
      userMsg.innerHTML = `<div class="avatar user-avatar">😎</div><div class="bubble">${input}</div>`;
      chatBox.appendChild(userMsg);
      inputEl.value = "";

      const botMsg = document.createElement("div");
      botMsg.className = "message bot";
      botMsg.innerHTML = `
        <div class="avatar bot-avatar">⚡</div>
        <div class="bubble">
          <div class="thinking-dots"><span></span><span></span><span></span></div>
        </div>`;
      chatBox.appendChild(botMsg);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch("https://askkade-production.up.railway.app/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: input })
        });
        const data = await response.json();
        botMsg.querySelector(".bubble").textContent = data.reply;
      } catch {
        botMsg.querySelector(".bubble").textContent = "⚠️ Lost connection to AskKade server.";
      }

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById("userInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
