<!DOCTYPE html>
<html lang="en">
<head>
  <title>AskKade</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f1a;
      --sidebar: #0f1724;
      --surface: #162033;
      --surface2: #1c2a42;
      --border: rgba(56,189,248,0.1);
      --accent: #38bdf8;
      --accent2: #818cf8;
      --accent3: #f472b6;
      --accent4: #34d399;
      --text: #e0eaff;
      --muted: #5a7299;
      --user-bubble: linear-gradient(135deg, #6366f1, #38bdf8);
      --bot-bubble: #162033;
      --sidebar-width: 260px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      height: 100dvh;
      position: relative;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-width);
      height: 100%;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.3s ease;
      z-index: 50;
    }

    /* Mobile: sidebar slides in as overlay */
    @media (max-width: 700px) {
      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 30px rgba(0,0,0,0.5); }
      .overlay { display: block !important; }
    }

    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 40;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }

    .brand-icon {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, #6366f1, #38bdf8);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      box-shadow: 0 0 14px rgba(99,102,241,0.4);
    }

    .brand-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900; font-size: 14px; letter-spacing: 2px;
      background: linear-gradient(90deg, #818cf8, #38bdf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .new-chat-btn {
      width: 100%; padding: 10px 14px;
      background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(56,189,248,0.15));
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 12px; color: var(--accent);
      font-family: 'Syne', sans-serif; font-size: 13px;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: all 0.2s;
    }
    .new-chat-btn:hover { background: linear-gradient(135deg, rgba(99,102,241,0.25), rgba(56,189,248,0.25)); }
    .new-chat-btn:active { transform: scale(0.98); }

    /* Sidebar sections */
    .sidebar-body { flex: 1; overflow-y: auto; padding: 12px 8px; }
    .sidebar-body::-webkit-scrollbar { width: 3px; }
    .sidebar-body::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 3px; }

    .section-label {
      font-size: 10px; color: var(--muted); letter-spacing: 1.5px;
      padding: 8px 8px 4px; font-family: 'Orbitron', sans-serif;
    }

    /* Projects */
    .project-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 10px; cursor: pointer;
      transition: all 0.15s; margin-bottom: 2px; position: relative;
    }
    .project-item:hover { background: rgba(56,189,248,0.07); }
    .project-item.active { background: rgba(56,189,248,0.12); border: 1px solid rgba(56,189,248,0.2); }
    .project-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .project-name { font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-count { font-size: 10px; color: var(--muted); background: rgba(56,189,248,0.08); padding: 2px 6px; border-radius: 10px; }

    /* Add project */
    .add-project-btn {
      width: 100%; padding: 7px 10px;
      background: transparent; border: 1px dashed rgba(56,189,248,0.2);
      border-radius: 10px; color: var(--muted); font-size: 12px;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: all 0.2s; margin-top: 4px; font-family: 'Syne', sans-serif;
    }
    .add-project-btn:hover { color: var(--accent); border-color: rgba(56,189,248,0.4); }

    /* Chat history items */
    .chat-item {
      padding: 8px 10px; border-radius: 10px; cursor: pointer;
      transition: all 0.15s; margin-bottom: 2px;
    }
    .chat-item:hover { background: rgba(56,189,248,0.07); }
    .chat-item.active { background: rgba(56,189,248,0.12); }
    .chat-item-title { font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .chat-item-meta { font-size: 10px; color: var(--muted); }

    .no-chats { font-size: 12px; color: var(--muted); padding: 8px 10px; font-style: italic; }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    /* BG effects */
    .bg-gradient {
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(56,189,248,0.07) 0%, transparent 50%);
    }

    .canvas { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .star { position:absolute; border-radius:999px; opacity:0; }
    .star-1{width:2px;height:70px;background:linear-gradient(180deg,transparent,var(--accent));top:-10%;left:25%;animation:shootStar 5s ease-in infinite 0s;}
    .star-2{width:2px;height:50px;background:linear-gradient(180deg,transparent,var(--accent2));top:-10%;left:65%;animation:shootStar 7s ease-in infinite 2s;}
    .star-3{width:2px;height:90px;background:linear-gradient(180deg,transparent,var(--accent3));top:-10%;left:85%;animation:shootStar 5.5s ease-in infinite 4s;}
    @keyframes shootStar{0%{opacity:0;transform:translateY(0) translateX(0);}8%{opacity:1;}85%{opacity:0.5;}100%{opacity:0;transform:translateY(110vh) translateX(50px);}}
    .orb{position:absolute;border-radius:50%;opacity:0;}
    .orb-1{width:6px;height:6px;background:var(--accent);box-shadow:0 0 10px var(--accent);top:70%;left:-2%;animation:travelRight 12s linear infinite 0s;}
    .orb-2{width:4px;height:4px;background:var(--accent2);box-shadow:0 0 8px var(--accent2);top:35%;left:-2%;animation:travelRight 10s linear infinite 3s;}
    @keyframes travelRight{0%{opacity:0;transform:translateX(0);}5%{opacity:1;}90%{opacity:0.7;}100%{opacity:0;transform:translateX(105vw);}}

    /* ── HEADER ── */
    .header {
      padding: 12px 16px;
      background: rgba(15,23,36,0.97);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      position: relative; z-index: 10; flex-shrink: 0;
    }

    .header::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg,var(--accent2),var(--accent),var(--accent3),var(--accent2));
      background-size:300% 100%; animation:shimmer 5s linear infinite;
    }
    @keyframes shimmer{0%{background-position:0% 0%;}100%{background-position:300% 0%;}}

    .menu-btn {
      width: 34px; height: 34px; border-radius: 9px;
      background: rgba(56,189,248,0.07); border: 1px solid var(--border);
      color: var(--accent); cursor: pointer;
      display: none; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0; transition: all 0.2s;
    }

    @media (max-width: 700px) { .menu-btn { display: flex; } }
    .menu-btn:hover { background: rgba(56,189,248,0.15); }

    .header-title {
      flex: 1; min-width: 0;
    }

    .chat-title-display {
      font-size: 13px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .chat-project-display { font-size: 11px; color: var(--muted); }

    .status {
      display: flex; align-items: center; gap: 5px;
      font-size: 9px; color: var(--muted);
      font-family: 'Orbitron', sans-serif; letter-spacing: 1px;
      background: rgba(56,189,248,0.05); padding: 4px 9px;
      border-radius: 20px; border: 1px solid var(--border); flex-shrink: 0;
    }
    .status-dot { width:5px; height:5px; background:#34d399; border-radius:50%; box-shadow:0 0 6px #34d399; animation:blink 2s ease-in-out infinite; }
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

    /* ── CHAT BOX ── */
    .chat-box {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 16px 14px;
      display: flex; flex-direction: column; gap: 12px;
      position: relative; z-index: 1;
      -webkit-overflow-scrolling: touch;
    }
    .chat-box::-webkit-scrollbar{width:3px;}
    .chat-box::-webkit-scrollbar-thumb{background:var(--accent2);border-radius:3px;}

    /* Welcome */
    .welcome { text-align:center; padding:24px 16px; animation:fadeInUp 0.8s ease; }
    .welcome-icon { font-size:44px; margin-bottom:12px; display:block; animation:float 4s ease-in-out infinite; filter:drop-shadow(0 0 12px rgba(56,189,248,0.4)); }
    @keyframes float{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-8px) rotate(2deg);}}
    .welcome h2 { font-family:'Orbitron',sans-serif; font-size:13px; background:linear-gradient(90deg,var(--accent2),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:8px; letter-spacing:2px; }
    .welcome p { font-size:12px; color:var(--muted); line-height:1.7; max-width:280px; margin:0 auto; }
    .chips { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:14px; }
    .chip { padding:5px 12px; border-radius:20px; font-size:11px; color:var(--accent); border:1px solid rgba(56,189,248,0.2); background:rgba(56,189,248,0.05); cursor:pointer; transition:all 0.2s; }
    .chip:hover { background:rgba(56,189,248,0.12); border-color:var(--accent); }
    .chip:active { transform:scale(0.95); }
    @keyframes fadeInUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

    /* Messages */
    .message { display:flex; gap:8px; animation:msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes msgIn{from{opacity:0;transform:translateY(10px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
    .message.user { flex-direction:row-reverse; }
    .avatar { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; margin-top:2px; }
    .bot-avatar { background:linear-gradient(135deg,#6366f1,#38bdf8); box-shadow:0 0 10px rgba(99,102,241,0.3); }
    .user-avatar { background:linear-gradient(135deg,#f472b6,#818cf8); box-shadow:0 0 10px rgba(244,114,182,0.3); }
    .msg-wrap { display:flex; flex-direction:column; gap:4px; max-width:82%; }
    .message.user .msg-wrap { align-items:flex-end; }
    .bubble { padding:10px 13px; border-radius:14px; font-size:13px; line-height:1.65; word-wrap:break-word; word-break:break-word; }
    .bot .bubble { background:var(--bot-bubble); border:1px solid rgba(56,189,248,0.1); color:var(--text); border-bottom-left-radius:4px; }
    .user .bubble { background:var(--user-bubble); color:white; border-bottom-right-radius:4px; box-shadow:0 4px 16px rgba(99,102,241,0.2); }

    /* Copy btn */
    .copy-btn { display:inline-flex; align-items:center; gap:4px; font-size:10px; color:var(--muted); background:rgba(56,189,248,0.05); border:1px solid rgba(56,189,248,0.1); border-radius:6px; padding:3px 7px; cursor:pointer; transition:all 0.2s; width:fit-content; }
    .copy-btn:hover { color:var(--accent); border-color:rgba(56,189,248,0.3); }
    .copy-btn.copied { color:var(--accent4); border-color:rgba(52,211,153,0.3); }
    .message.user .copy-btn { align-self:flex-end; }

    /* Cursor */
    .cursor { display:inline-block; width:2px; height:13px; background:var(--accent); margin-left:2px; vertical-align:middle; animation:cursorBlink 0.7s step-end infinite; }
    @keyframes cursorBlink{0%,100%{opacity:1;}50%{opacity:0;}}

    /* Thinking */
    .thinking-dots { display:inline-flex; gap:5px; align-items:center; padding:2px 0; }
    .thinking-dots span { width:6px; height:6px; border-radius:50%; animation:dotBounce 1.2s ease-in-out infinite; }
    .thinking-dots span:nth-child(1){background:var(--accent);}
    .thinking-dots span:nth-child(2){background:var(--accent2);animation-delay:0.2s;}
    .thinking-dots span:nth-child(3){background:var(--accent3);animation-delay:0.4s;}
    @keyframes dotBounce{0%,100%{transform:translateY(0);opacity:0.4;}50%{transform:translateY(-6px);opacity:1;}}

    /* Copied text banner */
    .copy-banner {
      margin: 0 14px 8px;
      padding: 8px 14px;
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 10px;
      font-size: 12px; color: var(--accent4);
      display: flex; align-items: center; gap: 8px;
      animation: fadeInUp 0.3s ease;
      position: relative; z-index: 1; flex-shrink: 0;
    }
    .copy-banner button {
      margin-left: auto; background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 14px; padding: 0 4px;
    }

    /* ── INPUT ── */
    .input-area {
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: rgba(15,23,36,0.97);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
      position: relative; z-index: 10; flex-shrink: 0;
    }

    input {
      flex: 1; min-width: 0;
      background: rgba(8,12,22,0.85);
      border: 1px solid rgba(56,189,248,0.14); border-radius: 12px;
      padding: 10px 14px; font-size: 14px; color: var(--text);
      font-family: 'Syne', sans-serif; outline: none; transition: all 0.3s;
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: rgba(56,189,248,0.4); background: rgba(12,18,32,0.9); }

    .send-btn {
      width: 40px; height: 40px; border-radius: 11px;
      background: linear-gradient(135deg,#6366f1,#38bdf8);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(99,102,241,0.35);
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      -webkit-tap-highlight-color: transparent;
    }
    .send-btn:hover { transform:scale(1.08); }
    .send-btn:active { transform:scale(0.92); }

    /* Toast */
    .toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.3);
      color: var(--accent4); padding: 7px 16px; border-radius: 20px;
      font-size: 12px; opacity: 0; transition: all 0.3s; z-index: 200;
      backdrop-filter: blur(10px); white-space: nowrap;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* Project modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 100; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; width: 300px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transform: scale(0.9); transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal h3 { font-family:'Orbitron',sans-serif; font-size:13px; color:var(--accent); margin-bottom:14px; letter-spacing:1px; }
    .modal input {
      width: 100%; padding: 10px 14px; margin-bottom: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family:'Syne',sans-serif;
      font-size: 13px; outline: none;
    }
    .modal input:focus { border-color: var(--accent); }
    .color-picker { display:flex; gap:8px; margin-bottom:14px; }
    .color-dot { width:22px; height:22px; border-radius:50%; cursor:pointer; transition:transform 0.2s; border:2px solid transparent; }
    .color-dot:hover { transform:scale(1.2); }
    .color-dot.selected { border-color: white; transform:scale(1.2); }
    .modal-btns { display:flex; gap:8px; }
    .modal-btn { flex:1; padding:9px; border-radius:10px; font-size:13px; cursor:pointer; font-family:'Syne',sans-serif; transition:all 0.2s; }
    .modal-btn.cancel { background:transparent; border:1px solid var(--border); color:var(--muted); }
    .modal-btn.confirm { background:linear-gradient(135deg,#6366f1,#38bdf8); border:none; color:white; }
    .modal-btn:hover { opacity:0.85; }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Project modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>NEW PROJECT</h3>
    <input type="text" id="projectNameInput" placeholder="Project name..." maxlength="30" />
    <div class="color-picker" id="colorPicker"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn confirm" onclick="confirmProject()">Create</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">⚡</div>
        <div class="brand-name">ASKKADE</div>
      </div>
      <button class="new-chat-btn" onclick="newChat()">
        ✏️ New Chat
      </button>
    </div>

    <div class="sidebar-body" id="sidebarBody">
      <!-- Projects and history rendered here -->
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="bg-gradient"></div>
    <div class="canvas">
      <div class="star star-1"></div>
      <div class="star star-2"></div>
      <div class="star star-3"></div>
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
    </div>

    <!-- Header -->
    <div class="header">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="header-title">
        <div class="chat-title-display" id="chatTitleDisplay">New Chat</div>
        <div class="chat-project-display" id="chatProjectDisplay">AskKade</div>
      </div>
      <div class="status">
        <div class="status-dot"></div>
        ONLINE
      </div>
    </div>

    <!-- Copied text banner -->
    <div class="copy-banner" id="copyBanner" style="display:none;">
      <span>📋</span>
      <span id="copyBannerText"></span>
      <button onclick="dismissCopyBanner()">✕</button>
    </div>

    <!-- Chat box -->
    <div class="chat-box" id="chatBox"></div>

    <!-- Input -->
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask me anything..." autocomplete="off" />
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
const SESSION_ID = Math.random().toString(36).substring(2, 15);
const BACKEND = "https://askkade-production.up.railway.app";

// Load from localStorage
let projects = JSON.parse(localStorage.getItem('ak_projects') || '[]');
let chats = JSON.parse(localStorage.getItem('ak_chats') || '[]');
let currentChatId = null;
let currentProjectId = null;
let selectedColor = '#38bdf8';

const PROJECT_COLORS = ['#38bdf8','#818cf8','#f472b6','#34d399','#fb923c','#facc15'];

const welcomeMsgs = [
  "I'm AskKade — your AI with personality. Drop a question and let's vibe.",
  "No boring answers here. Ask me anything and I'll keep it real.",
  "Think of me as your smartest friend who never sleeps.",
  "Powered by AI, seasoned with Kade energy. What do you need?",
];

// ── SAVE ──
function save() {
  localStorage.setItem('ak_projects', JSON.stringify(projects));
  localStorage.setItem('ak_chats', JSON.stringify(chats));
}

// ── SIDEBAR ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').style.display =
    document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').style.display = 'none';
}

// ── RENDER SIDEBAR ──
function renderSidebar() {
  const body = document.getElementById('sidebarBody');
  let html = '';

  // Projects
  html += `<div class="section-label">PROJECTS</div>`;
  projects.forEach(p => {
    const count = chats.filter(c => c.projectId === p.id).length;
    html += `
      <div class="project-item ${currentProjectId === p.id ? 'active' : ''}" onclick="selectProject('${p.id}')">
        <div class="project-dot" style="background:${p.color};box-shadow:0 0 6px ${p.color}"></div>
        <div class="project-name">${p.name}</div>
        <div class="project-count">${count}</div>
      </div>`;
  });
  html += `<button class="add-project-btn" onclick="openModal()">+ New Project</button>`;

  // Recent chats
  html += `<div class="section-label" style="margin-top:16px">RECENT CHATS</div>`;

  // Filter by project if selected
  let filtered = currentProjectId
    ? chats.filter(c => c.projectId === currentProjectId)
    : chats;

  // Sort newest first
  filtered = [...filtered].sort((a, b) => b.updatedAt - a.updatedAt);

  if (filtered.length === 0) {
    html += `<div class="no-chats">No chats yet</div>`;
  } else {
    // Group by time
    const now = Date.now();
    const day = 86400000;
    const groups = { 'Today': [], 'Yesterday': [], 'This Week': [], 'Older': [] };
    filtered.forEach(c => {
      const diff = now - c.updatedAt;
      if (diff < day) groups['Today'].push(c);
      else if (diff < 2 * day) groups['Yesterday'].push(c);
      else if (diff < 7 * day) groups['This Week'].push(c);
      else groups['Older'].push(c);
    });

    Object.entries(groups).forEach(([label, items]) => {
      if (items.length === 0) return;
      html += `<div class="section-label" style="margin-top:10px;font-size:9px">${label}</div>`;
      items.forEach(c => {
        const proj = projects.find(p => p.id === c.projectId);
        html += `
          <div class="chat-item ${currentChatId === c.id ? 'active' : ''}" onclick="loadChat('${c.id}')">
            <div class="chat-item-title">${c.title || 'New Chat'}</div>
            <div class="chat-item-meta">${proj ? `📁 ${proj.name} · ` : ''}${timeAgo(c.updatedAt)}</div>
          </div>`;
      });
    });
  }

  body.innerHTML = html;
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  const h = Math.floor(diff / 3600000);
  const d = Math.floor(diff / 86400000);
  if (m < 1) return 'Just now';
  if (m < 60) return `${m}m ago`;
  if (h < 24) return `${h}h ago`;
  return `${d}d ago`;
}

// ── PROJECTS ──
function openModal() {
  // Render color picker
  const picker = document.getElementById('colorPicker');
  picker.innerHTML = PROJECT_COLORS.map(c =>
    `<div class="color-dot ${c === selectedColor ? 'selected' : ''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
  ).join('');
  document.getElementById('projectNameInput').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('projectNameInput').focus(), 200);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function selectColor(color) {
  selectedColor = color;
  document.querySelectorAll('.color-dot').forEach(d => {
    d.classList.toggle('selected', d.style.background === color || d.style.backgroundColor === color);
  });
}

function confirmProject() {
  const name = document.getElementById('projectNameInput').value.trim();
  if (!name) return;
  const project = { id: Date.now().toString(), name, color: selectedColor, createdAt: Date.now() };
  projects.push(project);
  save();
  closeModal();
  renderSidebar();
  showToast(`📁 Project "${name}" created!`);
}

function selectProject(id) {
  currentProjectId = currentProjectId === id ? null : id;
  renderSidebar();
}

// ── CHATS ──
function newChat() {
  // Save current chat first
  currentChatId = Date.now().toString();
  const chat = {
    id: currentChatId,
    title: 'New Chat',
    projectId: currentProjectId || null,
    messages: [],
    updatedAt: Date.now(),
    createdAt: Date.now()
  };
  chats.push(chat);
  save();

  // Clear server memory
  fetch(`${BACKEND}/clear`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sessionId: SESSION_ID })
  }).catch(() => {});

  // Update UI
  renderChatBox([]);
  updateHeader();
  renderSidebar();
  closeSidebar();
}

function loadChat(id) {
  currentChatId = id;
  const chat = chats.find(c => c.id === id);
  if (!chat) return;

  // Restore project context
  currentProjectId = chat.projectId || null;

  // Clear server memory and rebuild from history
  fetch(`${BACKEND}/clear`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sessionId: SESSION_ID })
  }).then(() => {
    // Re-send history to server to restore context
    if (chat.messages.length > 0) {
      fetch(`${BACKEND}/restore`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: SESSION_ID, messages: chat.messages.slice(-10) })
      }).catch(() => {});
    }
  }).catch(() => {});

  renderChatBox(chat.messages);
  updateHeader();
  renderSidebar();
  closeSidebar();
}

function updateHeader() {
  const chat = chats.find(c => c.id === currentChatId);
  const proj = chat?.projectId ? projects.find(p => p.id === chat.projectId) : null;
  document.getElementById('chatTitleDisplay').textContent = chat?.title || 'New Chat';
  document.getElementById('chatProjectDisplay').textContent = proj ? `📁 ${proj.name}` : 'AskKade';
}

function renderChatBox(messages) {
  const chatBox = document.getElementById('chatBox');
  if (messages.length === 0) {
    chatBox.innerHTML = `
      <div class="welcome">
        <span class="welcome-icon">🤖</span>
        <h2>WELCOME TO ASKKADE</h2>
        <p>${welcomeMsgs[Math.floor(Math.random() * welcomeMsgs.length)]}</p>
        <div class="chips">
          <div class="chip" onclick="quickAsk('What can you do?')">What can you do?</div>
          <div class="chip" onclick="quickAsk('Tell me something cool')">Something cool</div>
          <div class="chip" onclick="quickAsk('Give me a fun fact')">Fun fact</div>
          <div class="chip" onclick="quickAsk('Help me write something')">Help me write</div>
        </div>
      </div>`;
    return;
  }

  chatBox.innerHTML = '';
  messages.forEach(m => {
    const div = document.createElement('div');
    div.className = `message ${m.role === 'user' ? 'user' : 'bot'}`;
    div.innerHTML = `
      <div class="avatar ${m.role === 'user' ? 'user-avatar' : 'bot-avatar'}">${m.role === 'user' ? '😎' : '⚡'}</div>
      <div class="msg-wrap">
        <div class="bubble">${m.content}</div>
        <div class="copy-btn" onclick="copyText(\`${m.content.replace(/`/g,"'")}\`, this)">⎘ Copy</div>
      </div>`;
    chatBox.appendChild(div);
  });
  chatBox.scrollTop = chatBox.scrollHeight;
}

// ── COPY DETECTION ──
let copyBannerTimeout;
document.addEventListener('copy', () => {
  setTimeout(() => {
    navigator.clipboard.readText().then(text => {
      if (text && text.trim().length > 3) {
        showCopyBanner(text.trim());
      }
    }).catch(() => {});
  }, 100);
});

function showCopyBanner(text) {
  const banner = document.getElementById('copyBanner');
  const bannerText = document.getElementById('copyBannerText');
  const preview = text.length > 60 ? text.substring(0, 60) + '...' : text;
  bannerText.textContent = `"${preview}" — Ask about this?`;
  banner.style.display = 'flex';
  banner.dataset.fullText = text;
  clearTimeout(copyBannerTimeout);
  copyBannerTimeout = setTimeout(() => {
    banner.style.display = 'none';
  }, 8000);
}

function dismissCopyBanner() {
  document.getElementById('copyBanner').style.display = 'none';
}

// Click banner to ask about copied text
document.getElementById('copyBanner').addEventListener('click', function(e) {
  if (e.target.tagName === 'BUTTON') return;
  const text = this.dataset.fullText;
  if (text) {
    document.getElementById('userInput').value = `Tell me more about: "${text}"`;
    dismissCopyBanner();
    sendMessage();
  }
});

// ── SOUND ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudio() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }
function playSend() {
  try {
    const ctx = getAudio(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sine';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.2);
  } catch(e) {}
}
function playReceive() {
  try {
    const ctx = getAudio(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sine';
    osc.frequency.setValueAtTime(400, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(550, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.09, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.25);
  } catch(e) {}
}

// ── TYPEWRITER ──
function typeWriter(element, text, speed = 14) {
  return new Promise(resolve => {
    element.innerHTML = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    element.appendChild(cursor);
    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        element.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
      } else {
        clearInterval(interval);
        cursor.remove();
        resolve();
      }
    }, speed);
  });
}

// ── COPY ──
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    showToast('✓ Copied to clipboard');
    setTimeout(() => { btn.textContent = '⎘ Copy'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    const el = document.createElement('textarea');
    el.value = text; document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el);
    showToast('✓ Copied!');
  });
}

// ── TOAST ──
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg; toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── QUICK ASK ──
function quickAsk(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

// ── SEND MESSAGE ──
async function sendMessage() {
  const inputEl = document.getElementById('userInput');
  const input = inputEl.value.trim();
  if (!input) return;

  const chatBox = document.getElementById('chatBox');
  const welcome = chatBox.querySelector('.welcome');
  if (welcome) welcome.remove();

  // Create chat if none
  if (!currentChatId) {
    currentChatId = Date.now().toString();
    const chat = {
      id: currentChatId,
      title: input.substring(0, 40),
      projectId: currentProjectId || null,
      messages: [],
      updatedAt: Date.now(),
      createdAt: Date.now()
    };
    chats.push(chat);
  }

  playSend();
  inputEl.value = '';

  // User message
  const userDiv = document.createElement('div');
  userDiv.className = 'message user';
  userDiv.innerHTML = `
    <div class="avatar user-avatar">😎</div>
    <div class="msg-wrap">
      <div class="bubble">${input}</div>
      <div class="copy-btn" onclick="copyText(\`${input.replace(/`/g,"'")}\`, this)">⎘ Copy</div>
    </div>`;
  chatBox.appendChild(userDiv);
  chatBox.scrollTop = chatBox.scrollHeight;

  // Bot thinking
  const botDiv = document.createElement('div');
  botDiv.className = 'message bot';
  botDiv.innerHTML = `
    <div class="avatar bot-avatar">⚡</div>
    <div class="msg-wrap">
      <div class="bubble"><div class="thinking-dots"><span></span><span></span><span></span></div></div>
    </div>`;
  chatBox.appendChild(botDiv);
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const response = await fetch(`${BACKEND}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: input, sessionId: SESSION_ID })
    });
    const data = await response.json();
    const replyText = data.reply;

    playReceive();
    const bubble = botDiv.querySelector('.bubble');
    await typeWriter(bubble, replyText, 14);

    const copyBtn = document.createElement('div');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = '⎘ Copy';
    copyBtn.onclick = () => copyText(replyText, copyBtn);
    botDiv.querySelector('.msg-wrap').appendChild(copyBtn);

    // Save to chat history
    const chat = chats.find(c => c.id === currentChatId);
    if (chat) {
      // Set title from first message
      if (chat.messages.length === 0) chat.title = input.substring(0, 40);
      chat.messages.push({ role: 'user', content: input });
      chat.messages.push({ role: 'assistant', content: replyText });
      chat.updatedAt = Date.now();
      save();
      updateHeader();
      renderSidebar();
    }

  } catch {
    botDiv.querySelector('.bubble').textContent = '⚠️ Lost connection to AskKade server.';
  }

  chatBox.scrollTop = chatBox.scrollHeight;
}

// Enter key
document.getElementById('userInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') sendMessage();
});

// ── INIT ──
function init() {
  renderSidebar();
  // Show welcome screen
  renderChatBox([]);
}

init();
</script>
