<!DOCTYPE html>
<html lang="en">
<head>
  <title>AskKade</title>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --void: #020409;
      --deep: #060d1a;
      --panel: #0a1628;
      --glass: rgba(10,22,40,0.85);
      --glass2: rgba(6,14,28,0.92);
      --rim: rgba(0,212,255,0.12);
      --rim2: rgba(139,92,246,0.12);
      --cyan: #00d4ff;
      --purple: #8b5cf6;
      --pink: #f43f8e;
      --gold: #f5a623;
      --green: #00ff9f;
      --white: #e8f4ff;
      --muted: #3d5a7a;
      --text: #c8ddf0;
      --sidebar-w: 280px;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html{height:100%;overflow:hidden;}
    body{
      height:100%;font-family:'Space Grotesk',sans-serif;
      background:var(--void);color:var(--text);
      overflow:hidden;position:fixed;width:100%;
    }

    /* ══ MULTIVERSE CANVAS ══ */
    #mv-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

    /* ══ HOLOGRAPHIC GRID ══ */
    .holo-grid{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:
        linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px);
      background-size:60px 60px;
      animation:gridDrift 30s linear infinite;
    }
    @keyframes gridDrift{0%{transform:perspective(800px) rotateX(8deg) translateY(0);}100%{transform:perspective(800px) rotateX(8deg) translateY(60px);}}

    /* ══ LAYOUT ══ */
    .layout{display:flex;height:100%;position:relative;z-index:10;}

    /* ══ SIDEBAR ══ */
    .sidebar{
      width:var(--sidebar-w);height:100%;
      background:var(--glass2);
      border-right:1px solid var(--rim);
      display:flex;flex-direction:column;
      flex-shrink:0;z-index:50;
      transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
      backdrop-filter:blur(40px);
      position:relative;overflow:hidden;
    }
    .sidebar::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent);
      animation:scanBar 4s ease-in-out infinite;
    }
    @keyframes scanBar{0%,100%{opacity:0.4;}50%{opacity:1;}}

    @media(max-width:768px){
      .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);}
      .sidebar.open{transform:translateX(0);box-shadow:0 0 60px rgba(0,212,255,0.15);}
    }

    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:40;backdrop-filter:blur(4px);}

    .sb-header{padding:20px 16px 16px;border-bottom:1px solid var(--rim);flex-shrink:0;}

    .brand{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
    .brand-gem{
      width:38px;height:38px;border-radius:10px;flex-shrink:0;
      background:linear-gradient(135deg,#8b5cf6,#00d4ff);
      display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
    }
    .brand-gem::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.25) 50%,transparent 60%);
      animation:gemShine 3s ease-in-out infinite;
    }
    @keyframes gemShine{0%,100%{transform:translateX(-100%);}50%{transform:translateX(100%);}}
    .brand-gem svg{width:20px;height:20px;fill:white;z-index:1;}
    .brand-wordmark{
      font-family:'Orbitron',monospace;font-weight:900;font-size:15px;letter-spacing:3px;
      background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
      background-size:200% 100%;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:wordmarkFlow 4s linear infinite;
    }
    @keyframes wordmarkFlow{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}

    .new-chat-btn{
      width:100%;padding:11px 14px;
      background:linear-gradient(135deg,rgba(139,92,246,0.15),rgba(0,212,255,0.15));
      border:1px solid rgba(139,92,246,0.3);
      border-radius:12px;color:var(--cyan);
      font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;
      cursor:pointer;display:flex;align-items:center;gap:10px;
      transition:all 0.3s;position:relative;overflow:hidden;
    }
    .new-chat-btn::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(0,212,255,0.08),transparent);
      transform:translateX(-100%);transition:transform 0.5s;
    }
    .new-chat-btn:hover::before{transform:translateX(100%);}
    .new-chat-btn:hover{border-color:rgba(0,212,255,0.5);box-shadow:0 0 20px rgba(0,212,255,0.1);}

    .sb-body{flex:1;overflow-y:auto;padding:12px 10px;-webkit-overflow-scrolling:touch;}
    .sb-body::-webkit-scrollbar{width:2px;}
    .sb-body::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px;}

    .sec-label{
      font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;
      color:var(--muted);padding:10px 8px 5px;text-transform:uppercase;
    }

    .proj-item{
      display:flex;align-items:center;gap:9px;padding:9px 10px;
      border-radius:10px;cursor:pointer;transition:all 0.2s;margin-bottom:2px;
      position:relative;overflow:hidden;border:1px solid transparent;
    }
    .proj-item:hover{background:rgba(0,212,255,0.06);border-color:var(--rim);}
    .proj-item.active{background:rgba(0,212,255,0.09);border-color:rgba(0,212,255,0.2);}
    .proj-orb{
      width:10px;height:10px;border-radius:50%;flex-shrink:0;
      box-shadow:0 0 8px currentColor;
    }
    .proj-name{font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
    .proj-count{
      font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);
      background:rgba(255,255,255,0.04);padding:2px 7px;border-radius:8px;
    }

    .add-proj-btn{
      width:100%;padding:8px 10px;background:transparent;
      border:1px dashed rgba(139,92,246,0.25);border-radius:10px;
      color:var(--muted);font-size:12px;font-family:'Space Grotesk',sans-serif;
      cursor:pointer;display:flex;align-items:center;gap:7px;
      transition:all 0.2s;margin-top:5px;
    }
    .add-proj-btn:hover{color:var(--purple);border-color:rgba(139,92,246,0.5);}

    .chat-item{
      padding:9px 10px;border-radius:10px;cursor:pointer;
      transition:all 0.2s;margin-bottom:2px;border:1px solid transparent;
    }
    .chat-item:hover{background:rgba(139,92,246,0.07);border-color:var(--rim2);}
    .chat-item.active{background:rgba(139,92,246,0.1);border-color:rgba(139,92,246,0.25);}
    .chat-item-title{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;color:var(--text);}
    .chat-item-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
    .no-chats{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);padding:8px 10px;font-style:italic;}

    /* ══ MAIN ══ */
    .main{flex:1;display:flex;flex-direction:column;min-width:0;height:100%;overflow:hidden;position:relative;}

    /* ══ HEADER ══ */
    .header{
      padding:13px 16px;
      background:var(--glass);backdrop-filter:blur(40px);
      border-bottom:1px solid var(--rim);
      display:flex;align-items:center;gap:12px;
      position:relative;z-index:10;flex-shrink:0;
    }
    .header::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent);
      opacity:0.4;
    }

    .menu-btn{
      width:36px;height:36px;border-radius:9px;
      background:rgba(0,212,255,0.06);border:1px solid var(--rim);
      color:var(--cyan);cursor:pointer;display:none;
      align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
      transition:all 0.2s;
    }
    @media(max-width:768px){.menu-btn{display:flex;}}
    .menu-btn:hover{background:rgba(0,212,255,0.12);}

    .header-info{flex:1;min-width:0;}
    .header-title{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .header-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:1px;}

    .status-chip{
      display:flex;align-items:center;gap:6px;
      font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);
      background:rgba(0,255,159,0.05);padding:5px 10px;
      border-radius:20px;border:1px solid rgba(0,255,159,0.12);flex-shrink:0;
      letter-spacing:1px;
    }
    .status-dot{width:5px;height:5px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

    /* ══ CHAT AREA ══ */
    .chat-area{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;position:relative;}

    .copy-banner{
      margin:8px 14px 0;padding:9px 14px;
      background:rgba(0,255,159,0.06);
      border:1px solid rgba(0,255,159,0.18);
      border-radius:12px;font-size:12px;color:var(--green);
      display:none;align-items:center;gap:9px;flex-shrink:0;cursor:pointer;
      font-family:'JetBrains Mono',monospace;
    }
    .copy-banner.show{display:flex;animation:slideDown 0.3s ease;}
    @keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
    .copy-banner-x{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px;}

    .chat-box{
      flex:1;overflow-y:auto;overflow-x:hidden;
      padding:20px 16px;display:flex;flex-direction:column;gap:16px;
      -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
    }
    .chat-box::-webkit-scrollbar{width:2px;}
    .chat-box::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px;}

    /* ══ WELCOME ══ */
    .welcome{text-align:center;padding:30px 20px;animation:wIn 1s cubic-bezier(0.16,1,0.3,1);}
    @keyframes wIn{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

    .welcome-orb{
      width:80px;height:80px;margin:0 auto 20px;border-radius:50%;
      background:radial-gradient(circle at 35% 35%,rgba(139,92,246,0.8),rgba(0,212,255,0.4),transparent 70%);
      border:1px solid rgba(139,92,246,0.4);
      position:relative;display:flex;align-items:center;justify-content:center;
      animation:orbSpin 8s linear infinite;
      box-shadow:0 0 40px rgba(139,92,246,0.2),inset 0 0 30px rgba(0,212,255,0.1);
    }
    @keyframes orbSpin{0%{box-shadow:0 0 40px rgba(139,92,246,0.2),inset 0 0 30px rgba(0,212,255,0.1);}50%{box-shadow:0 0 60px rgba(0,212,255,0.3),inset 0 0 40px rgba(139,92,246,0.15);}100%{box-shadow:0 0 40px rgba(139,92,246,0.2),inset 0 0 30px rgba(0,212,255,0.1);}}
    .welcome-orb::before{
      content:'';position:absolute;width:100px;height:100px;border-radius:50%;
      border:1px solid rgba(0,212,255,0.15);
      animation:ringExpand 3s ease-out infinite;
    }
    .welcome-orb::after{
      content:'';position:absolute;width:120px;height:120px;border-radius:50%;
      border:1px solid rgba(139,92,246,0.1);
      animation:ringExpand 3s ease-out infinite 1s;
    }
    @keyframes ringExpand{0%{transform:scale(0.8);opacity:0.8;}100%{transform:scale(1.4);opacity:0;}}
    .orb-icon{font-size:32px;z-index:1;filter:drop-shadow(0 0 10px rgba(0,212,255,0.5));}

    .welcome-title{
      font-family:'Orbitron',monospace;font-size:11px;letter-spacing:4px;
      background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
      background-size:200%;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:wordmarkFlow 4s linear infinite;margin-bottom:10px;
    }
    .welcome-sub{font-size:13px;color:var(--muted);line-height:1.7;max-width:300px;margin:0 auto 20px;}

    .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
    .chip{
      padding:7px 15px;border-radius:20px;font-size:12px;
      color:var(--cyan);border:1px solid rgba(0,212,255,0.2);
      background:rgba(0,212,255,0.05);cursor:pointer;
      transition:all 0.25s;font-family:'Space Grotesk',sans-serif;
      position:relative;overflow:hidden;
    }
    .chip::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(0,212,255,0.08),transparent);
      transform:translateX(-100%);transition:transform 0.4s;
    }
    .chip:hover::before{transform:translateX(100%);}
    .chip:hover{border-color:rgba(0,212,255,0.5);box-shadow:0 0 15px rgba(0,212,255,0.1);}
    .chip:active{transform:scale(0.96);}

    /* ══ MESSAGES ══ */
    .message{display:flex;gap:10px;animation:msgIn 0.4s cubic-bezier(0.16,1,0.3,1);}
    @keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
    .message.user{flex-direction:row-reverse;}

    .av{
      width:32px;height:32px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      font-size:15px;flex-shrink:0;margin-top:2px;
      position:relative;
    }
    .av-bot{
      background:linear-gradient(135deg,#8b5cf6,#00d4ff);
      box-shadow:0 0 15px rgba(139,92,246,0.4);
    }
    .av-bot::after{
      content:'';position:absolute;inset:-1px;border-radius:11px;
      border:1px solid rgba(0,212,255,0.4);
      animation:avGlow 2s ease-in-out infinite;
    }
    @keyframes avGlow{0%,100%{opacity:0.4;}50%{opacity:1;}}
    .av-user{background:linear-gradient(135deg,#f43f8e,#8b5cf6);box-shadow:0 0 15px rgba(244,63,142,0.3);}

    .msg-wrap{display:flex;flex-direction:column;gap:5px;max-width:80%;}
    .message.user .msg-wrap{align-items:flex-end;}

    .bubble{
      padding:12px 16px;border-radius:16px;
      font-size:13.5px;line-height:1.7;word-wrap:break-word;word-break:break-word;
      white-space:pre-wrap;position:relative;
    }
    .bot .bubble{
      background:var(--panel);
      border:1px solid rgba(139,92,246,0.2);
      color:var(--text);border-bottom-left-radius:4px;
    }
    .bot .bubble::before{
      content:'';position:absolute;inset:0;border-radius:inherit;
      background:linear-gradient(135deg,rgba(139,92,246,0.04),transparent);
      pointer-events:none;
    }
    .user .bubble{
      background:linear-gradient(135deg,rgba(139,92,246,0.8),rgba(0,212,255,0.6));
      color:white;border-bottom-right-radius:4px;
      box-shadow:0 4px 20px rgba(139,92,246,0.25);
    }

    .copy-btn{
      display:inline-flex;align-items:center;gap:5px;
      font-family:'JetBrains Mono',monospace;font-size:10px;
      color:var(--muted);background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:7px;padding:3px 9px;cursor:pointer;
      transition:all 0.2s;width:fit-content;letter-spacing:0.5px;
    }
    .copy-btn:hover{color:var(--cyan);border-color:rgba(0,212,255,0.25);background:rgba(0,212,255,0.05);}
    .copy-btn.copied{color:var(--green);border-color:rgba(0,255,159,0.25);}
    .message.user .copy-btn{align-self:flex-end;}

    .cursor{display:inline-block;width:2px;height:14px;background:var(--cyan);margin-left:2px;vertical-align:middle;animation:bCursor 0.7s step-end infinite;}
    @keyframes bCursor{0%,100%{opacity:1;}50%{opacity:0;}}

    .thinking-dots{display:inline-flex;gap:6px;align-items:center;padding:3px 0;}
    .thinking-dots span{width:7px;height:7px;border-radius:50%;animation:tDot 1.4s ease-in-out infinite;}
    .thinking-dots span:nth-child(1){background:var(--cyan);animation-delay:0s;}
    .thinking-dots span:nth-child(2){background:var(--purple);animation-delay:0.2s;}
    .thinking-dots span:nth-child(3){background:var(--pink);animation-delay:0.4s;}
    @keyframes tDot{0%,100%{transform:translateY(0);opacity:0.3;}50%{transform:translateY(-7px);opacity:1;}}

    /* ══ INPUT ══ */
    .input-area{
      padding:12px 14px;padding-bottom:max(12px,env(safe-area-inset-bottom));
      background:var(--glass);backdrop-filter:blur(40px);
      border-top:1px solid var(--rim);
      display:flex;align-items:center;gap:10px;
      flex-shrink:0;position:relative;
    }
    .input-area::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,var(--purple),var(--cyan),transparent);
      opacity:0.3;
    }

    .input-wrap{
      flex:1;min-width:0;position:relative;
      background:rgba(10,22,40,0.8);
      border:1px solid rgba(139,92,246,0.2);
      border-radius:14px;transition:border 0.3s,box-shadow 0.3s;
    }
    .input-wrap:focus-within{
      border-color:rgba(0,212,255,0.4);
      box-shadow:0 0 20px rgba(0,212,255,0.08),inset 0 0 10px rgba(0,212,255,0.03);
    }

    input{
      width:100%;background:transparent;border:none;
      padding:12px 16px;font-size:16px;color:var(--white);
      font-family:'Space Grotesk',sans-serif;outline:none;
      -webkit-appearance:none;
    }
    input::placeholder{color:var(--muted);}

    .send-btn{
      width:44px;height:44px;border-radius:12px;flex-shrink:0;
      background:linear-gradient(135deg,#8b5cf6,#00d4ff);
      border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      font-size:18px;color:white;
      box-shadow:0 4px 20px rgba(139,92,246,0.35);
      transition:all 0.25s cubic-bezier(0.16,1,0.3,1);
      position:relative;overflow:hidden;
    }
    .send-btn::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,transparent,rgba(255,255,255,0.15));
      opacity:0;transition:opacity 0.2s;
    }
    .send-btn:hover{transform:scale(1.07);box-shadow:0 6px 30px rgba(0,212,255,0.4);}
    .send-btn:hover::before{opacity:1;}
    .send-btn:active{transform:scale(0.93);}

    /* ══ TOAST ══ */
    .toast{
      position:fixed;bottom:85px;left:50%;
      transform:translateX(-50%) translateY(10px);
      background:rgba(0,255,159,0.1);border:1px solid rgba(0,255,159,0.25);
      color:var(--green);padding:7px 18px;border-radius:20px;
      font-family:'JetBrains Mono',monospace;font-size:11px;
      letter-spacing:0.5px;opacity:0;transition:all 0.3s;
      z-index:300;backdrop-filter:blur(20px);white-space:nowrap;pointer-events:none;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* ══ MODAL ══ */
    .modal-bg{
      position:fixed;inset:0;background:rgba(0,0,0,0.7);
      z-index:100;display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity 0.25s;backdrop-filter:blur(10px);
    }
    .modal-bg.open{opacity:1;pointer-events:all;}
    .modal{
      background:var(--panel);border:1px solid rgba(139,92,246,0.3);
      border-radius:20px;padding:24px;width:310px;margin:16px;
      box-shadow:0 30px 80px rgba(0,0,0,0.6),0 0 40px rgba(139,92,246,0.1);
      transform:scale(0.9) translateY(20px);transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
      position:relative;overflow:hidden;
    }
    .modal::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,var(--purple),var(--cyan),transparent);
    }
    .modal-bg.open .modal{transform:scale(1) translateY(0);}
    .modal-title{
      font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;
      color:var(--cyan);margin-bottom:18px;
    }
    .modal-input{
      width:100%;padding:11px 14px;margin-bottom:14px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:11px;color:var(--white);
      font-family:'Space Grotesk',sans-serif;font-size:16px;
      outline:none;-webkit-appearance:none;
      transition:border 0.2s;
    }
    .modal-input:focus{border-color:rgba(0,212,255,0.35);}
    .color-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
    .c-dot{
      width:26px;height:26px;border-radius:50%;cursor:pointer;
      border:2px solid transparent;transition:all 0.2s;
    }
    .c-dot.sel{border-color:white;transform:scale(1.2);box-shadow:0 0 12px currentColor;}
    .modal-btns{display:flex;gap:10px;}
    .m-btn{
      flex:1;padding:11px;border-radius:11px;
      font-family:'Space Grotesk',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;
    }
    .m-btn.cancel{background:transparent;border:1px solid rgba(255,255,255,0.08);color:var(--muted);}
    .m-btn.confirm{background:linear-gradient(135deg,#8b5cf6,#00d4ff);border:none;color:white;font-weight:500;}
    .m-btn:hover{opacity:0.85;}
  </style>
</head>
<body>

<!-- Multiverse particle canvas -->
<canvas id="mv-canvas"></canvas>
<div class="holo-grid"></div>
<div class="toast" id="toast"></div>

<!-- Project modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title">INITIALIZE PROJECT</div>
    <input class="modal-input" id="projName" type="text" placeholder="Project designation..." maxlength="30"/>
    <div class="color-row" id="colorRow"></div>
    <div class="modal-btns">
      <button class="m-btn cancel" onclick="closeModal()">Abort</button>
      <button class="m-btn confirm" onclick="confirmProj()">Initialize</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="brand">
        <div class="brand-gem">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div class="brand-wordmark">ASKKADE</div>
      </div>
      <button class="new-chat-btn" onclick="newChat()">
        <span style="font-size:16px">✦</span> New Transmission
      </button>
    </div>
    <div class="sb-body" id="sbBody"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="header">
      <button class="menu-btn" onclick="toggleSb()">☰</button>
      <div class="header-info">
        <div class="header-title" id="hTitle">New Transmission</div>
        <div class="header-sub" id="hSub">ASKKADE // MULTIVERSE NODE</div>
      </div>
      <div class="status-chip"><div class="status-dot"></div>CONNECTED</div>
    </div>

    <div class="chat-area">
      <div class="copy-banner" id="cpBanner" onclick="askCopy()">
        <span>◈</span>
        <span id="cpText"></span>
        <button class="copy-banner-x" onclick="event.stopPropagation();dismissCp()">✕</button>
      </div>
      <div class="chat-box" id="chatBox"></div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <input id="inp" type="text" placeholder="Transmit your query..." autocomplete="off" autocorrect="off" enterkeyhint="send"/>
      </div>
      <button class="send-btn" onclick="send()">➤</button>
    </div>
  </div>
</div>

<script>
/* ══ MULTIVERSE CANVAS ANIMATION ══ */
(function(){
  const cv = document.getElementById('mv-canvas');
  const ctx = cv.getContext('2d');
  let W, H, particles = [], wormholes = [], trails = [];

  function resize(){
    W = cv.width = window.innerWidth;
    H = cv.height = window.innerHeight;
  }

  const COLORS = ['#00d4ff','#8b5cf6','#f43f8e','#00ff9f','#f5a623','#7c3aed'];

  /* Wormhole portals */
  class Wormhole {
    constructor(){this.reset();}
    reset(){
      this.x = Math.random()*W; this.y = Math.random()*H;
      this.r = 0; this.maxR = 40+Math.random()*60;
      this.life = 0; this.maxLife = 120+Math.random()*180;
      this.color = COLORS[Math.floor(Math.random()*COLORS.length)];
      this.speed = 0.3+Math.random()*0.3;
      this.rings = 3+Math.floor(Math.random()*3);
      this.rot = 0;
    }
    draw(){
      this.life++; this.rot += 0.02;
      if(this.life > this.maxLife){this.reset();return;}
      const t = this.life/this.maxLife;
      const alpha = t < 0.2 ? t/0.2 : t > 0.8 ? (1-t)/0.2 : 1;
      this.r = this.maxR * (t < 0.3 ? t/0.3 : 1);
      for(let i=0;i<this.rings;i++){
        const ri = this.r*(0.4+i*0.2);
        ctx.save();
        ctx.translate(this.x,this.y);
        ctx.rotate(this.rot*(i%2===0?1:-1));
        ctx.beginPath();
        ctx.arc(0,0,ri,0,Math.PI*2);
        ctx.strokeStyle = this.color;
        ctx.globalAlpha = alpha*(0.6-i*0.15);
        ctx.lineWidth = 1-i*0.2;
        ctx.setLineDash([4+i*3,6+i*4]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
      /* core glow */
      const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*0.4);
      g.addColorStop(0,this.color+'44');
      g.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(this.x,this.y,this.r*0.4,0,Math.PI*2);
      ctx.fillStyle=g;ctx.globalAlpha=alpha*0.5;ctx.fill();
      ctx.globalAlpha=1;
    }
  }

  /* Quantum particles */
  class QParticle {
    constructor(){this.reset(true);}
    reset(init=false){
      if(init){
        this.x=Math.random()*W; this.y=Math.random()*H;
      } else {
        /* spawn from edges */
        const e=Math.floor(Math.random()*4);
        if(e===0){this.x=Math.random()*W;this.y=-5;}
        else if(e===1){this.x=Math.random()*W;this.y=H+5;}
        else if(e===2){this.x=-5;this.y=Math.random()*H;}
        else{this.x=W+5;this.y=Math.random()*H;}
      }
      this.color=COLORS[Math.floor(Math.random()*COLORS.length)];
      const a=Math.random()*Math.PI*2;
      const spd=0.3+Math.random()*1.5;
      this.vx=Math.cos(a)*spd; this.vy=Math.sin(a)*spd;
      this.size=0.5+Math.random()*2;
      this.life=0; this.maxLife=150+Math.random()*250;
      this.trail=[];
    }
    draw(){
      this.life++;
      if(this.life>this.maxLife||this.x<-20||this.x>W+20||this.y<-20||this.y>H+20){this.reset();return;}
      /* slight curve */
      this.vx += (Math.random()-0.5)*0.02;
      this.vy += (Math.random()-0.5)*0.02;
      this.x+=this.vx; this.y+=this.vy;
      /* trail */
      this.trail.push({x:this.x,y:this.y});
      if(this.trail.length>16)this.trail.shift();
      const t=this.life/this.maxLife;
      const alpha=t<0.1?t/0.1:t>0.85?(1-t)/0.15:1;
      /* draw trail */
      for(let i=1;i<this.trail.length;i++){
        const ta=((i/this.trail.length)*alpha*0.7);
        ctx.beginPath();
        ctx.moveTo(this.trail[i-1].x,this.trail[i-1].y);
        ctx.lineTo(this.trail[i].x,this.trail[i].y);
        ctx.strokeStyle=this.color;
        ctx.globalAlpha=ta;
        ctx.lineWidth=this.size*(i/this.trail.length);
        ctx.stroke();
      }
      /* head */
      ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
      ctx.fillStyle=this.color;ctx.globalAlpha=alpha;ctx.fill();
      /* glow */
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*4);
      g.addColorStop(0,this.color+'88');g.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(this.x,this.y,this.size*4,0,Math.PI*2);
      ctx.fillStyle=g;ctx.globalAlpha=alpha*0.4;ctx.fill();
      ctx.globalAlpha=1;
    }
  }

  /* Multiverse strings — connecting lines */
  class MvString {
    constructor(){this.reset();}
    reset(){
      this.x1=Math.random()*W;this.y1=Math.random()*H;
      const a=Math.random()*Math.PI*2;
      const len=80+Math.random()*200;
      this.x2=this.x1+Math.cos(a)*len;
      this.y2=this.y1+Math.sin(a)*len;
      this.color=COLORS[Math.floor(Math.random()*COLORS.length)];
      this.life=0;this.maxLife=100+Math.random()*150;
      this.progress=0;
    }
    draw(){
      this.life++;
      if(this.life>this.maxLife){this.reset();return;}
      const t=this.life/this.maxLife;
      const alpha=t<0.2?t/0.2:t>0.7?(1-t)/0.3:1;
      this.progress=Math.min(1,this.life/60);
      const ex=this.x1+(this.x2-this.x1)*this.progress;
      const ey=this.y1+(this.y2-this.y1)*this.progress;
      ctx.beginPath();ctx.moveTo(this.x1,this.y1);ctx.lineTo(ex,ey);
      ctx.strokeStyle=this.color;ctx.globalAlpha=alpha*0.3;ctx.lineWidth=0.5;
      ctx.stroke();ctx.globalAlpha=1;
    }
  }

  /* Init */
  resize();
  window.addEventListener('resize',resize);
  const whs=[new Wormhole(),new Wormhole(),new Wormhole()];
  const qps=Array.from({length:35},()=>new QParticle());
  const strs=Array.from({length:8},()=>new MvString());

  function frame(){
    ctx.clearRect(0,0,W,H);
    whs.forEach(w=>w.draw());
    strs.forEach(s=>s.draw());
    qps.forEach(p=>p.draw());
    requestAnimationFrame(frame);
  }
  frame();
})();

/* ══ APP STATE ══ */
const BACKEND='https://askkade-production.up.railway.app';
const SID=Math.random().toString(36).substring(2,15);
const PC=['#00d4ff','#8b5cf6','#f43f8e','#00ff9f','#f5a623','#f43f8e'];
let projects=JSON.parse(localStorage.getItem('ak_p')||'[]');
let chats=JSON.parse(localStorage.getItem('ak_c')||'[]');
let cChatId=null,cProjId=null,selColor='#00d4ff',copiedTxt='',cpTimeout;

const WM=[
  "AskKade online — multiverse node active. Transmit your query.",
  "Quantum link established. What knowledge do you seek?",
  "No signal lost here. Ask anything — I process at light speed.",
  "System ready. Kade intelligence loaded. What do you need?",
];

function save(){
  localStorage.setItem('ak_p',JSON.stringify(projects));
  localStorage.setItem('ak_c',JSON.stringify(chats));
}

/* ══ INPUT MOBILE FIX ══ */
const inp=document.getElementById('inp');
inp.addEventListener('focus',()=>{
  setTimeout(()=>{
    const cb=document.getElementById('chatBox');
    cb.scrollTop=cb.scrollHeight;
    inp.scrollIntoView({block:'nearest'});
  },350);
});
inp.addEventListener('keypress',e=>{if(e.key==='Enter'){e.preventDefault();send();}});

/* ══ SIDEBAR ══ */
function toggleSb(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('overlay');
  sb.classList.toggle('open');
  ov.style.display=sb.classList.contains('open')?'block':'none';
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').style.display='none';
}

function renderSb(){
  const body=document.getElementById('sbBody');
  let h=`<div class="sec-label">// PROJECTS</div>`;
  projects.forEach(p=>{
    const n=chats.filter(c=>c.projectId===p.id).length;
    h+=`<div class="proj-item${cProjId===p.id?' active':''}" onclick="selProj('${p.id}')">
      <div class="proj-orb" style="background:${p.color};color:${p.color}"></div>
      <div class="proj-name">${p.name}</div>
      <div class="proj-count">${n}</div>
    </div>`;
  });
  h+=`<button class="add-proj-btn" onclick="openModal()">+ Initialize Project</button>`;
  h+=`<div class="sec-label" style="margin-top:18px">// TRANSMISSIONS</div>`;
  let filtered=cProjId?chats.filter(c=>c.projectId===cProjId):[...chats];
  filtered.sort((a,b)=>b.updatedAt-a.updatedAt);
  if(!filtered.length){h+=`<div class="no-chats">// no transmissions logged</div>`;}
  else{
    const now=Date.now(),d=86400000;
    const grps=[
      {l:'// TODAY',items:filtered.filter(c=>now-c.updatedAt<d)},
      {l:'// YESTERDAY',items:filtered.filter(c=>now-c.updatedAt>=d&&now-c.updatedAt<2*d)},
      {l:'// THIS CYCLE',items:filtered.filter(c=>now-c.updatedAt>=2*d&&now-c.updatedAt<7*d)},
      {l:'// ARCHIVE',items:filtered.filter(c=>now-c.updatedAt>=7*d)},
    ];
    grps.forEach(({l,items})=>{
      if(!items.length)return;
      h+=`<div class="sec-label" style="margin-top:10px;font-size:8px">${l}</div>`;
      items.forEach(c=>{
        const p=projects.find(x=>x.id===c.projectId);
        h+=`<div class="chat-item${cChatId===c.id?' active':''}" onclick="loadChat('${c.id}')">
          <div class="chat-item-title">${c.title||'New Transmission'}</div>
          <div class="chat-item-meta">${p?`[${p.name}] · `:``}${ago(c.updatedAt)}</div>
        </div>`;
      });
    });
  }
  body.innerHTML=h;
}

function ago(ts){
  const d=Date.now()-ts,m=Math.floor(d/60000),h=Math.floor(d/3600000),dy=Math.floor(d/86400000);
  if(m<1)return'just now';if(m<60)return`${m}m ago`;if(h<24)return`${h}h ago`;return`${dy}d ago`;
}

/* ══ PROJECTS ══ */
function openModal(){
  selColor='#00d4ff';
  document.getElementById('colorRow').innerHTML=PC.map(c=>
    `<div class="c-dot${c===selColor?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
  document.getElementById('projName').value='';
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}
function pickColor(c){
  selColor=c;
  document.querySelectorAll('.c-dot').forEach(d=>d.classList.toggle('sel',d.style.background===c));
}
function confirmProj(){
  const name=document.getElementById('projName').value.trim();
  if(!name)return;
  projects.push({id:Date.now().toString(),name,color:selColor,createdAt:Date.now()});
  save();closeModal();renderSb();toast(`◈ Project "${name}" initialized`);
}
function selProj(id){cProjId=cProjId===id?null:id;renderSb();}

/* ══ CHATS ══ */
function newChat(){
  cChatId=Date.now().toString();
  chats.push({id:cChatId,title:'New Transmission',projectId:cProjId||null,messages:[],updatedAt:Date.now(),createdAt:Date.now()});
  save();
  fetch(`${BACKEND}/clear`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:SID})}).catch(()=>{});
  renderBox([]);updateHeader();renderSb();closeSidebar();
  setTimeout(()=>inp.focus(),300);
}

function loadChat(id){
  cChatId=id;
  const c=chats.find(x=>x.id===id);if(!c)return;
  cProjId=c.projectId||null;
  fetch(`${BACKEND}/clear`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:SID})})
    .then(()=>{
      if(c.messages.length>0)
        fetch(`${BACKEND}/restore`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:SID,messages:c.messages.slice(-10)})}).catch(()=>{});
    }).catch(()=>{});
  renderBox(c.messages);updateHeader();renderSb();closeSidebar();
}

function updateHeader(){
  const c=chats.find(x=>x.id===cChatId);
  const p=c?.projectId?projects.find(x=>x.id===c.projectId):null;
  document.getElementById('hTitle').textContent=c?.title||'New Transmission';
  document.getElementById('hSub').textContent=p?`PROJECT: ${p.name.toUpperCase()} // ASKKADE`:'ASKKADE // MULTIVERSE NODE';
}

function renderBox(msgs){
  const cb=document.getElementById('chatBox');
  if(!msgs.length){
    cb.innerHTML=`<div class="welcome">
      <div class="welcome-orb"><div class="orb-icon">⚡</div></div>
      <div class="welcome-title">ASKKADE ONLINE</div>
      <div class="welcome-sub">${WM[Math.floor(Math.random()*WM.length)]}</div>
      <div class="chips">
        <div class="chip" onclick="quickAsk('What can you do?')">Capabilities</div>
        <div class="chip" onclick="quickAsk('Tell me something fascinating')">Fascinate me</div>
        <div class="chip" onclick="quickAsk('Give me a fun fact')">Fun fact</div>
        <div class="chip" onclick="quickAsk('Help me write something')">Write with me</div>
      </div>
    </div>`;
    return;
  }
  cb.innerHTML='';
  msgs.forEach(m=>addBubble(m.role,m.content,false));
  cb.scrollTop=cb.scrollHeight;
}

function addBubble(role,content,animate=true){
  const cb=document.getElementById('chatBox');
  const div=document.createElement('div');
  div.className=`message ${role==='user'?'user':'bot'}`;
  const safe=content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  div.innerHTML=`
    <div class="av ${role==='user'?'av-user':'av-bot'}">${role==='user'?'😎':'⚡'}</div>
    <div class="msg-wrap">
      <div class="bubble">${safe}</div>
      <div class="copy-btn" onclick="cp(this,'${encodeURIComponent(content)}')">⎘ copy</div>
    </div>`;
  cb.appendChild(div);
  return div;
}

/* ══ COPY DETECT ══ */
document.addEventListener('copy',()=>{
  setTimeout(()=>{
    navigator.clipboard.readText().then(t=>{
      if(t&&t.trim().length>3)showCpBanner(t.trim());
    }).catch(()=>{});
  },150);
});
function showCpBanner(t){
  copiedTxt=t;
  const prev=t.length>60?t.substring(0,60)+'…':t;
  document.getElementById('cpText').textContent=`"${prev}" — tap to ask`;
  document.getElementById('cpBanner').classList.add('show');
  clearTimeout(cpTimeout);cpTimeout=setTimeout(dismissCp,8000);
}
function dismissCp(){document.getElementById('cpBanner').classList.remove('show');}
function askCopy(){
  if(!copiedTxt)return;
  inp.value=`Tell me more about: "${copiedTxt.substring(0,100)}"`;
  dismissCp();send();
}

/* ══ SOUND ══ */
let actx;
function getACtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function playTone(f1,f2,dur,vol=0.08){
  try{
    const ctx=getACtx(),osc=ctx.createOscillator(),g=ctx.createGain();
    osc.connect(g);g.connect(ctx.destination);osc.type='sine';
    osc.frequency.setValueAtTime(f1,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(f2,ctx.currentTime+dur*0.7);
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur);
  }catch(e){}
}

/* ══ TYPEWRITER ══ */
function typeWriter(el,text,spd=13){
  return new Promise(res=>{
    el.textContent='';
    const cur=document.createElement('span');cur.className='cursor';el.appendChild(cur);
    let i=0;
    const iv=setInterval(()=>{
      if(i<text.length){
        el.insertBefore(document.createTextNode(text[i]),cur);i++;
        document.getElementById('chatBox').scrollTop=document.getElementById('chatBox').scrollHeight;
      }else{clearInterval(iv);cur.remove();res();}
    },spd);
  });
}

/* ══ COPY ══ */
function cp(btn,enc){
  const text=decodeURIComponent(enc);
  const fb=()=>{const el=document.createElement('textarea');el.value=text;el.style.cssText='position:fixed;opacity:0';document.body.appendChild(el);el.focus();el.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(el);};
  (navigator.clipboard?.writeText(text)||Promise.reject()).catch(fb);
  btn.textContent='✓ copied';btn.classList.add('copied');toast('✓ Copied to buffer');
  setTimeout(()=>{btn.textContent='⎘ copy';btn.classList.remove('copied');},2000);
}

/* ══ TOAST ══ */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function quickAsk(t){inp.value=t;send();}

/* ══ SEND ══ */
async function send(){
  const input=inp.value.trim();if(!input)return;
  const cb=document.getElementById('chatBox');
  const w=cb.querySelector('.welcome');if(w)w.remove();
  if(!cChatId){
    cChatId=Date.now().toString();
    chats.push({id:cChatId,title:input.substring(0,40),projectId:cProjId||null,messages:[],updatedAt:Date.now(),createdAt:Date.now()});
  }
  playTone(500,800,0.18);inp.value='';
  const ud=addBubble('user',input);
  cb.scrollTop=cb.scrollHeight;
  const bd=document.createElement('div');bd.className='message bot';
  bd.innerHTML=`<div class="av av-bot">⚡</div><div class="msg-wrap"><div class="bubble"><div class="thinking-dots"><span></span><span></span><span></span></div></div></div>`;
  cb.appendChild(bd);cb.scrollTop=cb.scrollHeight;
  try{
    const r=await fetch(`${BACKEND}/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:input,sessionId:SID})});
    const data=await r.json();const reply=data.reply;
    playTone(350,500,0.22);
    const bub=bd.querySelector('.bubble');
    await typeWriter(bub,reply,13);
    const cpb=document.createElement('div');cpb.className='copy-btn';cpb.textContent='⎘ copy';
    cpb.onclick=()=>cp(cpb,encodeURIComponent(reply));
    bd.querySelector('.msg-wrap').appendChild(cpb);
    const chat=chats.find(c=>c.id===cChatId);
    if(chat){
      if(chat.messages.length===0)chat.title=input.substring(0,40);
      chat.messages.push({role:'user',content:input});
      chat.messages.push({role:'assistant',content:reply});
      chat.updatedAt=Date.now();save();updateHeader();renderSb();
    }
  }catch(e){bd.querySelector('.bubble').textContent='⚠ Signal lost. Reconnecting...';}
  cb.scrollTop=cb.scrollHeight;
}

/* ══ INIT ══ */
renderSb();renderBox([]);
</script>
</body>
</html>
