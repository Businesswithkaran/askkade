<!DOCTYPE html>
<html lang="en">
<head>
  <title>AskKade</title>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Fira+Code:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#020c02;
      --panel:rgba(2,12,2,0.92);
      --glass:rgba(0,8,0,0.88);
      --green:#00ff41;
      --green2:#00cc33;
      --green3:rgba(0,255,65,0.08);
      --green4:rgba(0,255,65,0.04);
      --dim:#004d10;
      --muted:#1a4d1a;
      --text:#a0ffa0;
      --bright:#e0ffe0;
      --red:#ff3333;
      --amber:#ffaa00;
      --cyan:#00ffcc;
      --border:rgba(0,255,65,0.15);
      --border2:rgba(0,255,65,0.08);
      --sw:270px;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;background:var(--bg);}
    body{position:fixed;width:100%;top:0;left:0;font-family:'Fira Code',monospace;color:var(--text);}

    /* ── BACKGROUND CANVAS ── */
    #bgc{position:fixed;inset:0;z-index:0;}

    /* Scanlines overlay */
    .scanlines{
      position:fixed;inset:0;z-index:1;pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
      animation:scn 8s linear infinite;
    }
    @keyframes scn{0%{background-position:0 0;}100%{background-position:0 100px;}}

    /* CRT vignette */
    .crt{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.6) 100%);}

    /* ── LAYOUT ── */
    .layout{display:flex;height:100%;width:100%;position:relative;z-index:10;}

    /* ── SIDEBAR ── */
    .sidebar{
      width:var(--sw);height:100%;
      background:var(--glass);
      border-right:1px solid var(--border);
      display:flex;flex-direction:column;
      flex-shrink:0;position:relative;overflow:hidden;
      backdrop-filter:blur(20px);
    }

    @media(max-width:768px){
      .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:200;transform:translateX(-100%);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);}
      .sidebar.open{transform:translateX(0);box-shadow:0 0 40px rgba(0,255,65,0.1);}
    }

    .ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:199;}
    .ov.show{display:block;}

    /* Sidebar top bar */
    .sb-top{
      padding:16px 14px 12px;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }

    .brand{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
    .brand-icon{
      font-family:'Share Tech Mono',monospace;
      font-size:22px;color:var(--green);
      text-shadow:0 0 10px var(--green),0 0 20px rgba(0,255,65,0.5);
      animation:flicker 4s ease-in-out infinite;
    }
    @keyframes flicker{0%,100%{opacity:1;}92%{opacity:1;}93%{opacity:0.7;}94%{opacity:1;}96%{opacity:0.8;}97%{opacity:1;}}
    .brand-name{
      font-family:'Share Tech Mono',monospace;font-size:16px;letter-spacing:3px;
      color:var(--green);text-shadow:0 0 8px rgba(0,255,65,0.6);
    }

    .ncb{
      width:100%;padding:9px 12px;
      background:var(--green3);border:1px solid var(--border);
      border-radius:4px;color:var(--green);
      font-family:'Share Tech Mono',monospace;font-size:12px;
      cursor:pointer;display:flex;align-items:center;gap:8px;
      transition:all 0.2s;text-align:left;
    }
    .ncb:hover{background:rgba(0,255,65,0.12);border-color:rgba(0,255,65,0.35);text-shadow:0 0 6px rgba(0,255,65,0.5);}
    .ncb::before{content:'>';color:var(--green2);}

    .sb-body{flex:1;overflow-y:auto;padding:10px 8px;-webkit-overflow-scrolling:touch;}
    .sb-body::-webkit-scrollbar{width:2px;}
    .sb-body::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}

    .slbl{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--dim);padding:10px 8px 4px;}

    .pi{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:3px;cursor:pointer;transition:all 0.15s;margin-bottom:1px;border-left:2px solid transparent;}
    .pi:hover{background:var(--green4);border-left-color:var(--green2);}
    .pi.act{background:var(--green3);border-left-color:var(--green);}
    .porb{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
    .pnm{font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
    .pcnt{font-size:10px;color:var(--dim);font-family:'Share Tech Mono',monospace;}

    .apb{width:100%;padding:6px 10px;background:transparent;border:1px dashed var(--muted);border-radius:3px;color:var(--dim);font-size:11px;font-family:'Share Tech Mono',monospace;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all 0.2s;margin-top:5px;}
    .apb:hover{color:var(--green);border-color:var(--dim);}
    .apb::before{content:'+';}

    .ci{padding:7px 10px;border-radius:3px;cursor:pointer;transition:all 0.15s;margin-bottom:1px;border-left:2px solid transparent;}
    .ci:hover{background:var(--green4);border-left-color:var(--dim);}
    .ci.act{background:var(--green3);border-left-color:var(--green);}
    .cit{font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;color:var(--text);}
    .cim{font-size:9px;color:var(--muted);font-family:'Share Tech Mono',monospace;}
    .nc{font-size:10px;color:var(--muted);padding:8px 10px;font-family:'Share Tech Mono',monospace;}

    /* ── MAIN ── */
    .main{flex:1;display:flex;flex-direction:column;min-width:0;height:100%;overflow:hidden;position:relative;}

    /* ── HEADER ── */
    .hdr{
      padding:11px 14px;
      background:var(--panel);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:10px;
      position:relative;z-index:10;flex-shrink:0;
    }

    /* Typing cursor in header */
    .hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:0.4;}

    .mbtn{
      width:36px;height:36px;border-radius:3px;
      background:var(--green3);border:1px solid var(--border);
      color:var(--green);cursor:pointer;display:none;
      align-items:center;justify-content:center;
      font-size:18px;flex-shrink:0;transition:all 0.2s;
      font-family:'Share Tech Mono',monospace;
      touch-action:manipulation;
    }
    @media(max-width:768px){.mbtn{display:flex !important;}}
    .mbtn:active{background:rgba(0,255,65,0.15);}

    .hi{flex:1;min-width:0;}
    .ht{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--green);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 0 6px rgba(0,255,65,0.4);}
    .hs{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--dim);margin-top:2px;letter-spacing:1px;}

    .stc{
      display:flex;align-items:center;gap:6px;
      font-family:'Share Tech Mono',monospace;font-size:9px;
      color:var(--green2);letter-spacing:1px;
      background:var(--green3);padding:4px 10px;
      border-radius:3px;border:1px solid var(--border);flex-shrink:0;
    }
    .sdot{width:5px;height:5px;background:var(--green);border-radius:50%;box-shadow:0 0 6px var(--green);animation:pl 2s ease-in-out infinite;}
    @keyframes pl{0%,100%{opacity:1;}50%{opacity:0.2;}}

    /* ── CHAT AREA ── */
    .ca{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;position:relative;z-index:1;}

    /* Copy banner */
    .cpb{margin:6px 12px 0;padding:8px 12px;background:rgba(0,255,204,0.05);border:1px solid rgba(0,255,204,0.2);border-radius:3px;font-size:11px;color:var(--cyan);display:none;align-items:center;gap:8px;flex-shrink:0;cursor:pointer;font-family:'Share Tech Mono',monospace;}
    .cpb.show{display:flex;}
    .cpbx{margin-left:auto;background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;}

    /* Chat box */
    .cb{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 14px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
    .cb::-webkit-scrollbar{width:3px;}
    .cb::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}

    /* ── WELCOME ── */
    .wlc{padding:20px 10px;animation:wIn 0.8s ease;}
    @keyframes wIn{from{opacity:0;}to{opacity:1;}}

    .wlc-head{
      font-family:'Share Tech Mono',monospace;font-size:11px;
      color:var(--green);margin-bottom:16px;line-height:1.8;
    }
    .wlc-head .ln{display:block;}
    .wlc-head .cmd{color:var(--green2);}
    .wlc-head .out{color:var(--text);}
    .wlc-head .err{color:var(--red);}
    .wlc-head .ok{color:var(--amber);}
    .wlc-head .info{color:var(--cyan);}

    .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px;}
    .chip{
      padding:5px 12px;border-radius:2px;font-size:11px;
      color:var(--green);border:1px solid var(--border);
      background:var(--green4);cursor:pointer;
      transition:all 0.15s;font-family:'Share Tech Mono',monospace;
    }
    .chip::before{content:'$ ';}
    .chip:hover{background:var(--green3);border-color:rgba(0,255,65,0.35);text-shadow:0 0 6px rgba(0,255,65,0.5);}
    .chip:active{transform:scale(0.97);}

    /* ── MESSAGES ── */
    .msg{display:flex;flex-direction:column;gap:3px;animation:msgIn 0.2s ease;}
    @keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

    /* User message — terminal command style */
    .msg.usr .mhead{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--green2);margin-bottom:4px;}
    .msg.usr .mbody{
      padding:10px 14px;background:var(--green3);
      border:1px solid var(--border);border-radius:3px;
      border-left:3px solid var(--green);
      font-size:13px;color:var(--bright);line-height:1.6;
      word-wrap:break-word;word-break:break-word;font-family:'Fira Code',monospace;
    }

    /* Bot message — terminal output style */
    .msg.bot .mhead{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--amber);margin-bottom:4px;}
    .msg.bot .mbody{
      padding:12px 14px;
      background:rgba(0,8,0,0.6);
      border:1px solid var(--border2);border-radius:3px;
      border-left:3px solid var(--amber);
      font-size:13px;color:var(--text);line-height:1.75;
      word-wrap:break-word;word-break:break-word;
      font-family:'Fira Code',monospace;
      white-space:pre-wrap;
    }

    /* File chip */
    .fchip{display:inline-flex;align-items:center;gap:6px;background:rgba(0,255,204,0.06);border:1px solid rgba(0,255,204,0.2);border-radius:2px;padding:3px 8px;font-size:10px;color:var(--cyan);margin-bottom:6px;font-family:'Share Tech Mono',monospace;}

    /* Action buttons */
    .btns-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
    .abtn{
      display:inline-flex;align-items:center;gap:4px;
      font-family:'Share Tech Mono',monospace;font-size:10px;
      color:var(--dim);background:transparent;
      border:1px solid var(--muted);border-radius:2px;
      padding:3px 8px;cursor:pointer;transition:all 0.15s;
    }
    .abtn:hover{color:var(--green);border-color:var(--dim);}
    .abtn.done{color:var(--green);border-color:var(--green2);}
    .abtn.spk{color:var(--dim);}
    .abtn.spk:hover{color:var(--amber);border-color:var(--amber);}
    .abtn.spk.on{color:var(--amber);border-color:var(--amber);animation:spkp 1s ease-in-out infinite;}
    @keyframes spkp{0%,100%{opacity:1;}50%{opacity:0.5;}}

    /* Cursor */
    .cursor{display:inline-block;width:8px;height:14px;background:var(--green);margin-left:2px;vertical-align:middle;animation:cur 0.7s step-end infinite;}
    @keyframes cur{0%,100%{opacity:1;}50%{opacity:0;}}

    /* Thinking */
    .thinking{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--green2);}
    .tdots{display:inline;}
    .dot-anim::after{content:'';animation:dots 1.5s steps(4,end) infinite;}
    @keyframes dots{0%{content:'';}25%{content:'.';}50%{content:'..';}75%{content:'...';}100%{content:'';}}

    /* ── INPUT AREA ── */
    .ia{
      padding:10px 12px;
      padding-bottom:max(10px,env(safe-area-inset-bottom));
      background:var(--panel);
      border-top:1px solid var(--border);
      display:flex;flex-direction:column;gap:7px;
      flex-shrink:0;position:relative;z-index:10;
    }

    /* file preview */
    .fbar{display:none;align-items:center;gap:8px;padding:5px 10px;background:rgba(0,255,204,0.04);border:1px solid rgba(0,255,204,0.15);border-radius:3px;font-size:11px;color:var(--cyan);font-family:'Share Tech Mono',monospace;}
    .fbar.show{display:flex;}
    .fbar-x{margin-left:auto;background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;}

    .ia-row{display:flex;align-items:center;gap:8px;}

    /* Terminal prompt */
    .prompt{
      display:flex;align-items:center;
      flex:1;min-width:0;
      background:rgba(0,255,65,0.03);
      border:1px solid var(--border);border-radius:3px;
      padding:0 12px;
    }
    .prompt-prefix{
      font-family:'Share Tech Mono',monospace;font-size:13px;
      color:var(--green2);flex-shrink:0;margin-right:8px;
      white-space:nowrap;
    }
    input[type=text]{
      flex:1;min-width:0;background:transparent;border:none;
      padding:11px 0;font-size:14px;color:var(--bright);
      font-family:'Fira Code',monospace;outline:none;-webkit-appearance:none;
      caret-color:var(--green);
    }
    input[type=text]::placeholder{color:var(--muted);}

    /* Tool buttons */
    .tbts{display:flex;align-items:center;gap:5px;flex-shrink:0;}
    .tbtn{
      width:36px;height:36px;border-radius:3px;flex-shrink:0;
      background:var(--green3);border:1px solid var(--border);
      color:var(--green2);cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      font-size:15px;transition:all 0.2s;touch-action:manipulation;
      font-family:'Share Tech Mono',monospace;
    }
    .tbtn:hover,.tbtn:active{background:rgba(0,255,65,0.12);color:var(--green);}
    .tbtn.rec{background:rgba(255,51,51,0.12);color:var(--red);border-color:rgba(255,51,51,0.3);animation:rp 1s ease-in-out infinite;}
    @keyframes rp{0%,100%{box-shadow:none;}50%{box-shadow:0 0 10px rgba(255,51,51,0.3);}}

    .sbtn{
      width:38px;height:38px;border-radius:3px;flex-shrink:0;
      background:var(--green3);border:1px solid rgba(0,255,65,0.35);
      color:var(--green);cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      font-size:16px;font-family:'Share Tech Mono',monospace;
      transition:all 0.2s;touch-action:manipulation;
    }
    .sbtn:hover{background:rgba(0,255,65,0.12);box-shadow:0 0 12px rgba(0,255,65,0.2);}
    .sbtn:active{transform:scale(0.93);}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(0,8,0,0.9);border:1px solid var(--border);color:var(--green);padding:6px 16px;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:0.5px;opacity:0;transition:all 0.25s;z-index:400;white-space:nowrap;pointer-events:none;box-shadow:0 0 20px rgba(0,255,65,0.15);}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* ── VOICE INDICATOR ── */
    .vind{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:rgba(0,8,0,0.9);border:1px solid rgba(255,51,51,0.3);border-radius:3px;padding:8px 18px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--red);z-index:100;display:none;align-items:center;gap:10px;box-shadow:0 0 20px rgba(255,51,51,0.1);}
    .vind.show{display:flex;}
    .vbars{display:flex;gap:2px;align-items:center;height:18px;}
    .vbar{width:3px;background:var(--red);border-radius:1px;animation:vb 0.6s ease-in-out infinite;}
    .vbar:nth-child(1){animation-delay:0s;height:5px;}
    .vbar:nth-child(2){animation-delay:0.1s;height:12px;}
    .vbar:nth-child(3){animation-delay:0.2s;height:18px;}
    .vbar:nth-child(4){animation-delay:0.3s;height:12px;}
    .vbar:nth-child(5){animation-delay:0.4s;height:5px;}
    @keyframes vb{0%,100%{transform:scaleY(0.4);}50%{transform:scaleY(1);}}

    /* ── MODAL ── */
    .mbg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
    .mbg.open{opacity:1;pointer-events:all;}
    .modal{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:20px;width:290px;margin:16px;box-shadow:0 0 40px rgba(0,255,65,0.1);transform:translateY(10px);transition:transform 0.2s;position:relative;}
    .mbg.open .modal{transform:translateY(0);}
    .mtl{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--green);margin-bottom:14px;}
    .mtl::before{content:'> ';}
    .minp{width:100%;padding:9px 12px;margin-bottom:12px;background:var(--green3);border:1px solid var(--border);border-radius:3px;color:var(--bright);font-family:'Fira Code',monospace;font-size:14px;outline:none;-webkit-appearance:none;}
    .minp:focus{border-color:rgba(0,255,65,0.4);}
    .crow{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
    .cdot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
    .cdot.sel{border-color:var(--green);transform:scale(1.15);}
    .mbtns{display:flex;gap:8px;}
    .mbtn2{flex:1;padding:9px;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.15s;}
    .mbtn2.can{background:transparent;border:1px solid var(--muted);color:var(--dim);}
    .mbtn2.con{background:var(--green3);border:1px solid rgba(0,255,65,0.35);color:var(--green);}
    .mbtn2.con:hover{background:rgba(0,255,65,0.12);}
  </style>
</head>
<body>

<!-- Neural network + space canvas -->
<canvas id="bgc"></canvas>
<div class="scanlines"></div>
<div class="crt"></div>
<div class="toast" id="toast"></div>

<!-- Voice indicator -->
<div class="vind" id="vind">
  <div class="vbars"><div class="vbar"></div><div class="vbar"></div><div class="vbar"></div><div class="vbar"></div><div class="vbar"></div></div>
  <span>REC // LISTENING</span>
  <button onclick="stopVoice()" style="background:none;border:none;color:var(--red);cursor:pointer;margin-left:6px;">✕</button>
</div>

<!-- Project modal -->
<div class="mbg" id="mbg">
  <div class="modal">
    <div class="mtl">CREATE PROJECT</div>
    <input class="minp" id="pni" type="text" placeholder="project_name" maxlength="30"/>
    <div class="crow" id="crow"></div>
    <div class="mbtns">
      <button class="mbtn2 can" onclick="closeModal()">abort</button>
      <button class="mbtn2 con" onclick="confirmProj()">execute</button>
    </div>
  </div>
</div>

<input type="file" id="fileIn" style="display:none" accept="image/*,.pdf,.txt,.doc,.docx" onchange="handleFile(this)"/>

<div class="ov" id="ov"></div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sb">
    <div class="sb-top">
      <div class="brand">
        <div class="brand-icon">[AK]</div>
        <div class="brand-name">ASKKADE</div>
      </div>
      <button class="ncb" onclick="newChat()"> new_session</button>
    </div>
    <div class="sb-body" id="sbb"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="hdr">
      <button class="mbtn" id="menuBtn" onclick="toggleSb()">≡</button>
      <div class="hi">
        <div class="ht" id="ht">> askkade.sh --interactive</div>
        <div class="hs" id="hs">session_id: <span id="sidDisp"></span> // status: active</div>
      </div>
      <div class="stc"><div class="sdot"></div>LIVE</div>
    </div>

    <div class="ca">
      <div class="cpb" id="cpb" onclick="askCopy()">
        <span>[CLIP]</span><span id="cpt"></span>
        <button class="cpbx" onclick="event.stopPropagation();dCp()">✕</button>
      </div>
      <div class="cb" id="cb"></div>
    </div>

    <div class="ia">
      <div class="fbar" id="fbar">
        <span>[FILE]</span><span id="fname"></span>
        <button class="fbar-x" onclick="clearFile()">✕</button>
      </div>
      <div class="ia-row">
        <div class="prompt">
          <span class="prompt-prefix">kade@ai:~$</span>

          <button class="tbtn" id="vbtn" onclick="toggleVoice()" title="voice">🎤</button>

<script>
/* ══ NEURAL NETWORK + SPACE BACKGROUND ══ */
(function(){
  const cv=document.getElementById('bgc'),ctx=cv.getContext('2d');
  let W,H,nodes=[],conns=[],stars=[];

  function resize(){
    W=cv.width=window.innerWidth;
    H=cv.height=window.innerHeight;
    initScene();
  }

  /* Neural nodes — simulate neurons */
  class Node {
    constructor(){
      this.x=Math.random()*W;
      this.y=Math.random()*H;
      this.vx=(Math.random()-0.5)*0.15;
      this.vy=(Math.random()-0.5)*0.15;
      this.r=1+Math.random()*2;
      this.pulse=Math.random()*Math.PI*2;
      this.pulseSpeed=0.02+Math.random()*0.03;
      this.firing=false;
      this.fireTimer=0;
      this.fireInterval=120+Math.floor(Math.random()*300);
      this.type=Math.random()>0.8?'major':'minor';/* major nodes are bigger */
      if(this.type==='major')this.r=2.5+Math.random()*2;
    }
    update(){
      this.x+=this.vx;this.y+=this.vy;
      if(this.x<0)this.x=W;if(this.x>W)this.x=0;
      if(this.y<0)this.y=H;if(this.y>H)this.y=0;
      this.pulse+=this.pulseSpeed;
      this.fireTimer++;
      if(this.fireTimer>this.fireInterval){this.firing=true;this.fireTimer=0;this.fireInterval=120+Math.floor(Math.random()*300);}
      if(this.firing&&this.fireTimer>15){this.firing=false;}
    }
    draw(){
      const glow=this.firing?1.5:0.6+Math.sin(this.pulse)*0.3;
      const col=this.firing?'rgba(0,255,65,'+glow+')':'rgba(0,255,65,'+glow*0.4+')';
      /* glow */
      const gr=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*(this.firing?8:4));
      gr.addColorStop(0,this.firing?'rgba(0,255,65,0.4)':'rgba(0,255,65,0.15)');
      gr.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(this.x,this.y,this.r*(this.firing?8:4),0,Math.PI*2);
      ctx.fillStyle=gr;ctx.fill();
      /* core */
      ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
      ctx.fillStyle=col;ctx.fill();
    }
  }

  /* Synaptic connection with signal pulse */
  class Conn {
    constructor(a,b){
      this.a=a;this.b=b;
      this.progress=-1;/* signal not travelling */
      this.active=false;
    }
    trigger(){if(!this.active){this.active=true;this.progress=0;}}
    update(){if(this.active){this.progress+=0.012;if(this.progress>1){this.active=false;this.progress=-1;}}}
    draw(){
      const dx=this.b.x-this.a.x,dy=this.b.y-this.a.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>200)return;
      const alpha=this.active?0.35:0.06*(1-(dist/200));
      ctx.beginPath();ctx.moveTo(this.a.x,this.a.y);ctx.lineTo(this.b.x,this.b.y);
      ctx.strokeStyle=`rgba(0,255,65,${alpha})`;ctx.lineWidth=0.5;ctx.stroke();
      /* signal pulse */
      if(this.active&&this.progress>=0){
        const px=this.a.x+dx*this.progress;
        const py=this.a.y+dy*this.progress;
        const pg=ctx.createRadialGradient(px,py,0,px,py,5);
        pg.addColorStop(0,'rgba(0,255,65,0.9)');pg.addColorStop(1,'transparent');
        ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);
        ctx.fillStyle=pg;ctx.fill();
      }
    }
  }

  /* Deep space stars */
  class Star {
    constructor(){this.reset();}
    reset(){
      this.x=Math.random()*W;this.y=Math.random()*H;
      this.size=Math.random()*0.8;
      this.opacity=Math.random()*0.4+0.1;
      this.twinkle=Math.random()*Math.PI*2;
      this.twinkleSpeed=0.01+Math.random()*0.02;
    }
    draw(){
      this.twinkle+=this.twinkleSpeed;
      const op=this.opacity*(0.6+Math.sin(this.twinkle)*0.4);
      ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,220,180,${op})`;ctx.fill();
    }
  }

  /* Nebula blobs in background */
  function drawNebula(){
    const blobs=[
      {x:W*0.15,y:H*0.2,r:W*0.2,c:'rgba(0,40,8,0.4)'},
      {x:W*0.8,y:H*0.7,r:W*0.18,c:'rgba(0,30,6,0.35)'},
      {x:W*0.5,y:H*0.5,r:W*0.12,c:'rgba(0,20,4,0.3)'},
      {x:W*0.3,y:H*0.8,r:W*0.15,c:'rgba(0,35,7,0.3)'},
    ];
    blobs.forEach(b=>{
      const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
      g.addColorStop(0,b.c);g.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
    });
  }

  function initScene(){
    nodes=Array.from({length:60},()=>new Node());
    conns=[];
    /* Connect nearby nodes */
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[j].x-nodes[i].x,dy=nodes[j].y-nodes[i].y;
        if(Math.sqrt(dx*dx+dy*dy)<160)conns.push(new Conn(nodes[i],nodes[j]));
      }
    }
    stars=Array.from({length:180},()=>new Star());
  }

  window.addEventListener('resize',resize);
  resize();

  let frame=0;
  function animate(){
    ctx.clearRect(0,0,W,H);
    /* Deep space bg */
    ctx.fillStyle='#020c02';ctx.fillRect(0,0,W,H);
    drawNebula();
    stars.forEach(s=>s.draw());
    /* Neural connections */
    conns.forEach(c=>{c.update();c.draw();});
    /* Fire signals when node fires */
    nodes.forEach(n=>{
      if(n.firing){
        conns.forEach(c=>{if((c.a===n||c.b===n)&&Math.random()>0.5)c.trigger();});
      }
      n.update();n.draw();
    });
    frame++;
    requestAnimationFrame(animate);
  }
  animate();

  /* Mouse/touch interaction — ripple on tap */
  function ripple(mx,my){
    nodes.forEach(n=>{
      const dx=n.x-mx,dy=n.y-my;
      if(Math.sqrt(dx*dx+dy*dy)<100){n.firing=true;n.fireTimer=0;}
    });
  }
  document.addEventListener('click',e=>ripple(e.clientX,e.clientY));
  document.addEventListener('touchstart',e=>{const t=e.touches[0];ripple(t.clientX,t.clientY);});
})();

/* ══ APP STATE ══ */
const BACKEND='https://askkade-production.up.railway.app';
const SID=Math.random().toString(36).substring(2,10).toUpperCase();
const PC=['#00ff41','#00ffcc','#ffaa00','#ff3333','#aa88ff','#00aaff'];
let projects=JSON.parse(localStorage.getItem('ak_p')||'[]');
let chats=JSON.parse(localStorage.getItem('ak_c')||'[]');
let cCid=null,cPid=null,selCol='#00ff41',cpTxt='',cpTO;
let attachedFile=null,attachedFileName='';
let isRec=false,recog=null,isSpeaking=false;

/* Show session ID */
document.getElementById('sidDisp').textContent=SID;

const WM=[
  `initializing askkade.sh v2.4.1...\nconnecting to ai core... [OK]\nneural bridge established.\nready. type your query below.`,
  `> boot sequence complete.\n> cognitive engine: online\n> awaiting user input...`,
  `[SYS] session started.\n[SYS] model: qwen3-32b\n[SYS] ask anything. i respond fast.`,
  `access granted.\nwelcome back, user.\nwhat do you need today?`,
];

function save(){localStorage.setItem('ak_p',JSON.stringify(projects));localStorage.setItem('ak_c',JSON.stringify(chats));}

/* ══ SIDEBAR ══ */
function toggleSb(){
  const sb=document.getElementById('sb'),ov=document.getElementById('ov');
  const open=sb.classList.contains('open');
  if(open){sb.classList.remove('open');ov.classList.remove('show');}
  else{sb.classList.add('open');ov.classList.add('show');}
}
function closeSb(){document.getElementById('sb').classList.remove('open');document.getElementById('ov').classList.remove('show');}
document.getElementById('ov').addEventListener('click',closeSb);

/* ══ INPUT ══ */
const inp=document.getElementById('inp');
inp.addEventListener('focus',()=>{setTimeout(()=>{document.getElementById('cb').scrollTop=document.getElementById('cb').scrollHeight;},350);});
inp.addEventListener('keypress',e=>{if(e.key==='Enter'){e.preventDefault();send();}});

/* ══ FILE ══ */
function handleFile(inp){
  const f=inp.files[0];if(!f)return;
  attachedFile=f;attachedFileName=f.name;
  document.getElementById('fname').textContent=f.name;
  document.getElementById('fbar').classList.add('show');
  toast('[FILE] attached: '+f.name);
  inp.value='';
}
function clearFile(){attachedFile=null;attachedFileName='';document.getElementById('fbar').classList.remove('show');}

/* ══ VOICE INPUT ══ */
function toggleVoice(){
  if(isRec){stopVoice();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('[ERR] voice not supported in this browser');return;}
  recog=new SR();recog.lang='en-US';recog.continuous=false;recog.interimResults=true;
  recog.onstart=()=>{isRec=true;document.getElementById('vbtn').classList.add('rec');document.getElementById('vbtn').textContent='⏹';document.getElementById('vind').classList.add('show');};
  recog.onresult=e=>{let t='';for(let i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;inp.value=t;};
  recog.onend=()=>{isRec=false;document.getElementById('vbtn').classList.remove('rec');document.getElementById('vbtn').textContent='🎤';document.getElementById('vind').classList.remove('show');if(inp.value.trim())send();};
  recog.onerror=()=>{stopVoice();toast('[ERR] voice recognition failed');};
  recog.start();
}
function stopVoice(){if(recog)recog.stop();isRec=false;document.getElementById('vbtn').classList.remove('rec');document.getElementById('vbtn').textContent='🎤';document.getElementById('vind').classList.remove('show');}

/* ══ VOICE OUTPUT ══ */
function speakText(text,btn){
  if(!window.speechSynthesis){toast('[ERR] tts not supported');return;}
  if(isSpeaking){window.speechSynthesis.cancel();isSpeaking=false;if(btn){btn.textContent='[speak]';btn.classList.remove('on');}return;}
  const u=new SpeechSynthesisUtterance(text);u.rate=1;u.pitch=1;
  const voices=window.speechSynthesis.getVoices();
  const v=voices.find(x=>x.lang.startsWith('en')&&x.name.includes('Google'))||voices.find(x=>x.lang.startsWith('en'))||voices[0];
  if(v)u.voice=v;
  u.onstart=()=>{isSpeaking=true;if(btn){btn.textContent='[stop]';btn.classList.add('on');}};
  u.onend=u.onerror=()=>{isSpeaking=false;if(btn){btn.textContent='[speak]';btn.classList.remove('on');}};
  window.speechSynthesis.speak(u);
}

/* ══ COPY DETECT ══ */
document.addEventListener('copy',()=>{
  setTimeout(()=>{navigator.clipboard.readText().then(t=>{if(t&&t.trim().length>3)showCpB(t.trim());}).catch(()=>{});},150);
});
function showCpB(t){cpTxt=t;const p=t.length>50?t.substring(0,50)+'...':t;document.getElementById('cpt').textContent=` "${p}" -- ask about this?`;document.getElementById('cpb').classList.add('show');clearTimeout(cpTO);cpTO=setTimeout(dCp,8000);}
function dCp(){document.getElementById('cpb').classList.remove('show');}
function askCopy(){if(!cpTxt)return;inp.value=`explain this: "${cpTxt.substring(0,100)}"`;dCp();send();}

/* ══ SOUND ══ */
let actx;
function getACtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function playTone(f1,f2,dur,vol=0.06){
  try{const c=getACtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.setValueAtTime(f1,c.currentTime);o.frequency.exponentialRampToValueAtTime(f2,c.currentTime+dur*0.5);g.gain.setValueAtTime(vol,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);o.start(c.currentTime);o.stop(c.currentTime+dur);}catch(e){}
}

/* ══ TYPEWRITER ══ */
function typeWriter(el,text,spd=12){
  return new Promise(res=>{
    el.textContent='';
    const cur=document.createElement('span');cur.className='cursor';el.appendChild(cur);
    let i=0;
    const iv=setInterval(()=>{
      if(i<text.length){el.insertBefore(document.createTextNode(text[i]),cur);i++;document.getElementById('cb').scrollTop=document.getElementById('cb').scrollHeight;}
      else{clearInterval(iv);cur.remove();res();}
    },spd);
  });
}

/* ══ COPY BTN ══ */
function cpText(btn,enc){
  const text=decodeURIComponent(enc);
  const fb=()=>{const el=document.createElement('textarea');el.value=text;el.style.cssText='position:fixed;opacity:0';document.body.appendChild(el);el.focus();el.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(el);};
  (navigator.clipboard?.writeText(text)||Promise.reject()).catch(fb);
  btn.textContent='[copied]';btn.classList.add('done');toast('[OK] copied to clipboard');
  setTimeout(()=>{btn.textContent='[copy]';btn.classList.remove('done');},2000);
}

/* ══ TOAST ══ */
function toast(msg){const t=document.getElementById('toast');t.textContent='> '+msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

/* ══ RENDER SIDEBAR ══ */
function renderSb(){
  const body=document.getElementById('sbb');
  let h=`<div class="slbl">// projects</div>`;
  projects.forEach(p=>{
    const n=chats.filter(c=>c.projectId===p.id).length;
    h+=`<div class="pi${cPid===p.id?' act':''}" onclick="selProj('${p.id}')"><div class="porb" style="background:${p.color}"></div><div class="pnm">${p.name}</div><div class="pcnt">[${n}]</div></div>`;
  });
  h+=`<button class="apb" onclick="openModal()"> new_project</button>`;
  h+=`<div class="slbl" style="margin-top:14px">// sessions</div>`;
  let fl=cPid?chats.filter(c=>c.projectId===cPid):[...chats];
  fl.sort((a,b)=>b.updatedAt-a.updatedAt);
  if(!fl.length){h+=`<div class="nc">// no sessions found</div>`;}
  else{
    const now=Date.now(),d=86400000;
    [{l:'// today',f:c=>now-c.updatedAt<d},{l:'// yesterday',f:c=>now-c.updatedAt>=d&&now-c.updatedAt<2*d},{l:'// this week',f:c=>now-c.updatedAt>=2*d&&now-c.updatedAt<7*d},{l:'// older',f:c=>now-c.updatedAt>=7*d}].forEach(({l,f})=>{
      const items=fl.filter(f);if(!items.length)return;
      h+=`<div class="slbl" style="margin-top:8px;font-size:8px">${l}</div>`;
      items.forEach(c=>{
        const p=projects.find(x=>x.id===c.projectId);
        h+=`<div class="ci${cCid===c.id?' act':''}" onclick="loadChat('${c.id}')"><div class="cit">${c.title||'unnamed_session'}</div><div class="cim">${p?`[${p.name}] `:''}${ago(c.updatedAt)}</div></div>`;
      });
    });
  }
  body.innerHTML=h;
}

function ago(ts){const d=Date.now()-ts,m=Math.floor(d/60000),h=Math.floor(d/3600000),dy=Math.floor(d/86400000);if(m<1)return'now';if(m<60)return m+'m';if(h<24)return h+'h';return dy+'d';}

/* ══ PROJECTS ══ */
function openModal(){
  selCol='#00ff41';
  document.getElementById('crow').innerHTML=PC.map(c=>`<div class="cdot${c===selCol?' sel':''}" style="background:${c}" onclick="pickCol('${c}')"></div>`).join('');
  document.getElementById('pni').value='';
  document.getElementById('mbg').classList.add('open');
}
function closeModal(){document.getElementById('mbg').classList.remove('open');}
function pickCol(c){selCol=c;document.querySelectorAll('.cdot').forEach(d=>d.classList.toggle('sel',d.style.background===c));}
function confirmProj(){const n=document.getElementById('pni').value.trim().replace(/\s+/g,'_');if(!n)return;projects.push({id:Date.now().toString(),name:n,color:selCol,createdAt:Date.now()});save();closeModal();renderSb();toast('[OK] project created: '+n);}
function selProj(id){cPid=cPid===id?null:id;renderSb();}

/* ══ CHATS ══ */
function newChat(){
  cCid=Date.now().toString();
  chats.push({id:cCid,title:'unnamed_session',projectId:cPid||null,messages:[],updatedAt:Date.now(),createdAt:Date.now()});
  save();
  fetch(`${BACKEND}/clear`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:SID})}).catch(()=>{});
  renderBox([]);updateHdr();renderSb();closeSb();
  setTimeout(()=>inp.focus(),300);
}

function loadChat(id){
  cCid=id;const c=chats.find(x=>x.id===id);if(!c)return;
  cPid=c.projectId||null;
  fetch(`${BACKEND}/clear`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:SID})}).then(()=>{
    if(c.messages.length>0)fetch(`${BACKEND}/restore`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:SID,messages:c.messages.slice(-10)})}).catch(()=>{});
  }).catch(()=>{});
  renderBox(c.messages);updateHdr();renderSb();closeSb();
}

function updateHdr(){
  const c=chats.find(x=>x.id===cCid);
  const p=c?.projectId?projects.find(x=>x.id===c.projectId):null;
  document.getElementById('ht').textContent='> '+(c?.title||'new_session')+'.sh';
  document.getElementById('hs').textContent='session_id: '+SID+(p?' // project: '+p.name:' // status: active');
}

function renderBox(msgs){
  const cb=document.getElementById('cb');
  if(!msgs.length){
    const wm=WM[Math.floor(Math.random()*WM.length)];
    cb.innerHTML=`<div class="wlc">
      <div class="wlc-head">
        <span class="ln cmd">$ askkade --start</span>
        <span class="ln out" style="white-space:pre-wrap">${wm}</span>
      </div>
      <div class="chips">
        <div class="chip" onclick="quickAsk('what can you do')">what can you do</div>
        <div class="chip" onclick="quickAsk('tell me something interesting')">something interesting</div>
        <div class="chip" onclick="quickAsk('give me a fun fact')">fun fact</div>
        <div class="chip" onclick="quickAsk('help me write something')">help me write</div>
      </div>
    </div>`;
    return;
  }
  cb.innerHTML='';
  msgs.forEach(m=>addBubble(m.role,m.content,false));
  cb.scrollTop=cb.scrollHeight;
}

function addBubble(role,content,animate=true){
  const cb=document.getElementById('cb');
  const div=document.createElement('div');
  div.className=`msg ${role==='user'?'usr':'bot'}`;
  const safe=content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const enc=encodeURIComponent(content);
  const isBot=role==='assistant'||role==='bot';
  const head=isBot?`<div class="mhead">[askkade@ai] output:</div>`:`<div class="mhead">[user@${SID}] input:</div>`;
  let btns=`<div class="abtn" onclick="cpText(this,'${enc}')">[copy]</div>`;
  if(isBot)btns+=`<div class="abtn spk" onclick="speakText(decodeURIComponent('${enc}'),this)">[speak]</div>`;
  div.innerHTML=`${head}<div class="mbody">${safe}</div><div class="btns-row">${btns}</div>`;
  cb.appendChild(div);
  return div;
}

function quickAsk(t){inp.value=t;send();}

/* ══ SEND ══ */
async function send(){
  const input=inp.value.trim();
  const hasFile=attachedFile!==null;
  if(!input&&!hasFile)return;

  const cb=document.getElementById('cb');
  const w=cb.querySelector('.wlc');if(w)w.remove();

  if(!cCid){
    cCid=Date.now().toString();
    chats.push({id:cCid,title:input.substring(0,35)||attachedFileName,projectId:cPid||null,messages:[],updatedAt:Date.now(),createdAt:Date.now()});
  }

  playTone(200,400,0.15);
  let msgText=input;
  if(hasFile)msgText=input?`${input}\n[attached: ${attachedFileName}]`:`[attached: ${attachedFileName}]`;

  inp.value='';

  /* User bubble */
  const ud=document.createElement('div');
  ud.className='msg usr';
  const safeInput=(input||attachedFileName).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const enc=encodeURIComponent(input||attachedFileName);
  ud.innerHTML=`<div class="mhead">[user@${SID}] input:</div>${hasFile?`<div class="fchip">📎 ${attachedFileName}</div>`:''}<div class="mbody">${safeInput}</div><div class="btns-row"><div class="abtn" onclick="cpText(this,'${enc}')">[copy]</div></div>`;
  cb.appendChild(ud);
  clearFile();
  cb.scrollTop=cb.scrollHeight;

  /* Bot thinking */
  const bd=document.createElement('div');
  bd.className='msg bot';
  bd.innerHTML=`<div class="mhead">[askkade@ai] output:</div><div class="mbody thinking">processing<span class="dot-anim"></span></div>`;
  cb.appendChild(bd);
  cb.scrollTop=cb.scrollHeight;

  try{
    const res=await fetch(`${BACKEND}/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msgText,sessionId:SID})});
    const data=await res.json();const reply=data.reply;
    playTone(300,600,0.2);

    const mbody=bd.querySelector('.mbody');
    await typeWriter(mbody,reply,12);

    const encR=encodeURIComponent(reply);
    const br=document.createElement('div');br.className='btns-row';
    br.innerHTML=`<div class="abtn" onclick="cpText(this,'${encR}')">[copy]</div><div class="abtn spk" onclick="speakText(decodeURIComponent('${encR}'),this)">[speak]</div>`;
    bd.appendChild(br);

    const chat=chats.find(c=>c.id===cCid);
    if(chat){
      if(chat.messages.length===0)chat.title=input.substring(0,35)||attachedFileName;
      chat.messages.push({role:'user',content:msgText});
      chat.messages.push({role:'assistant',content:reply});
      chat.updatedAt=Date.now();save();updateHdr();renderSb();
    }
  }catch(e){
    bd.querySelector('.mbody').textContent='[ERR] connection failed. check server status.';
  }
  cb.scrollTop=cb.scrollHeight;
}

/* ══ INIT ══ */
renderSb();renderBox([]);
if(window.speechSynthesis)window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
